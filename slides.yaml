
## Executive Summary

This report documents Model Risk Management (MRM) Validation's second Provisional Approval (PA2) review of Model-7306, PayVIEW - GTM and MMP ChatBot. It covers one change to the model: the Combined Answer. Under the original Provisional Approval, signed 01/30/2026, the model presented up to four separate candidate answers and their notes to the agent. The model now adds an additional generative large language model call that synthesizes those candidate answers and notes into a single newly generated combined answer with inline source citations.

Material changes to the model during the pilot were not permitted under the terms of the original Provisional Approval. The combined answer was nonetheless shown to pilot users from the start of the pilot on 05/04/2026 without the required separate approval. The Special Purpose Validation Outcome Form, signed 05/19/2026, reiterated that the combined answer change specifically was not approved and required separate documentation and approval before deployment. Model Risk Governance (MRG) determined the change material, and the business line disabled the model through a backend feature flag on 06/15/2026 pending this review. This PA2 is scoped to the combined answer change and to continued, expanded pilot use.

Validation reviewed the updated pilot performance for the combined answer output. Correctness is 72.7 percent on the deduplicated answered queries, which clears the 67 percent pilot threshold. Validation has no concerns that would prevent continued pilot use prior to a full validation and recommends an Approved with Restriction outcome through 11/01/2026. The comprehensive assessment will follow in the Initial Validation. Validation's recommendations on the change, including the corrections the model development team has committed to make before the pilot resumes, are documented in the Conclusion.

## Model Purpose and Usage

The model assists sales agents in answering Global Treasury Management (GTM) and Money Movement Platform (MMP) questions using the bank's knowledge base articles. It is employee facing, and agents review the model's output before relaying information to a customer. The model purpose and usage are unchanged from the original Provisional Approval; refer to the PA1 report for the full description.

## Model Theory and Construction

The retrieval augmented generation framework, embedding models, cache mechanism, gateway access, and foundation large language model are unchanged from the original Provisional Approval and are described in the PA1 report.

The change under this review is the addition of a new generative large language model call that produces the combined answer. The up-to-four candidate answers and their notes produced by the approved process are passed to the foundation large language model (GPT-4o) in an additional call that generates a single combined answer, consolidating duplicative content and preserving inline source citations. This is a generation step rather than a deterministic concatenation: the combined answer is newly generated text produced by the model from the candidate answers and notes. When only one candidate answer is available, the model formats it directly without the synthesis call. When no answer can be grounded, the model indicates that it could not find an answer and prompts the agent to verify manually. Which output is presented, the combined answer or the four separate answers, is selected by a backend, code level toggle that is internal and not user facing. This output-selection toggle is distinct from the feature flag the business line used to disable the Query Agent pending this review.

### Combined answer synthesis prompt

The system prompt and instruction used for the combined answer generation call are reproduced below as provided by the model development team.

System prompt, wrapped in Llama-2 style system tags:

```
<|SYS|>
You are a helpful, respectful and honest assistant. Always answer as helpfully as possible, while being safe. Your answers should not include any harmful, unethical, racist, sexist, toxic, dangerous, or illegal content. Please ensure that your responses are socially unbiased and positive in nature.
If a question does not make any sense, or is not factually coherent, explain why instead of answering something not correct. If you don't know the answer to a question, please don't share false information.
<</SYS>>
```

Instruction:

```
Question: {query}
Answers: {answers}
The above HTML snippet contains multiple answers from a RAG system in response to the question.
Task: Combine these answers into one cohesive paragraph with appropriate citations to answer the question.
Output guidelines: Merge repetitive content smoothly. Return the answer as a valid HTML. Add inline <a> citations in parentheses immediately after the sentences they support.
```

### Validation analysis of the synthesis prompt

Validation reviewed the synthesis prompt against standard prompt construction practices. The assessment is organized by practice below. These are recommendations for strengthening the prompt and do not, on their own, prevent the pilot from resuming.

1. Role specification (persona). The prompt defines a generic persona, "a helpful, respectful and honest assistant." It is not scoped to the Global Treasury Management and Money Movement Platform domain or to the task of consolidating retrieved answers, so it does not set domain vocabulary or precision expectations.
2. Explicit task description. The task is stated, to combine the answers into one cohesive paragraph with citations, but it does not state the downstream use, that the output is presented to a sales agent who relies on it, and it is described at a high level.
3. Delimiters. The candidate answers are passed as a single HTML snippet in the Answers field with no delimiters separating one answer from another and no marker separating the instruction from the data. This contributes to the lack of per-answer traceability noted in the Risk Mitigation section.
4. Constraints, positive and negative. The prompt includes positive constraints, to merge repetitive content, return valid HTML, and add inline citations, but no negative constraints. It does not instruct the model to use only the content of the provided answers, nor to avoid presenting an answer when the candidates contain none. The absence of these constraints is directly related to the combined answer behavior assessed in the Risk Mitigation section.
5. Few-shot examples. The prompt contains no examples of an acceptable combined answer, so the model is not shown the intended structure, level of detail, or citation behavior.
6. Output format specification. An output format is specified, a single valid HTML paragraph with inline anchor tag citations. The format is a prose paragraph rather than a structured, parseable format, and Validation observed that the citations render as empty parentheses in the non-HTML formats used for review.
7. Enumeration of required content. The prompt does not enumerate what the combined answer must preserve from the inputs, for example that each distinct grounded fact be retained and that no fact be introduced that is not in the inputs. What is included is left to the model.
8. Error handling and disambiguation. The prompt provides only generic safety handling, "if you don't know the answer, do not share false information." It does not handle the case where the provided answers contain no grounded answer, for example "I could not find a specific answer," and it does not disambiguate conflicting answers. This is the most material gap for this use case and is tied to the failed-article content reaching the combined output.
9. Self-verification. The prompt does not ask the model to verify that the combined answer is supported by the provided answers or that the citations correspond to real sources.

Given that this is a low-risk model and that GPT-4o is an advanced large language model capable of producing a coherent combined answer from the candidate answers even with a minimal prompt, and given that the pilot results were within the correctness threshold, Validation has no concerns with the synthesis prompt for the pilot. However, Validation recommends that the prompt be strengthened, in particular by adding explicit handling for unanswered inputs (item 8) and a constraint to ground the combined answer only in the provided answers (item 4), by adding per-article delimiters to the input (item 3), and by adapting the Llama-2 chat formatting to the GPT-4o interface, since GPT-4o does not interpret the Llama-2 system tags as a control structure and the prompt appears carried over from the prior Llama-2 based implementation. These recommendations are consolidated in the Conclusion and will be assessed further during the Initial Validation.

## Development Data

The development data and the retrieval corpus are unchanged from the original Provisional Approval; refer to the PA1 report. The pilot corpus comprises 526 knowledge base articles, the same set used for the original Provisional Approval and within the 800 article pilot limit. The combined answer change operates on the candidate answers already produced and does not alter the data sources or retrieval.

## Model Performance

Validation reviewed the pilot performance data for the combined answer output. The pilot data comprises 72 deduplicated queries, of which 44 received a substantive answer and 28 returned no answer. Correctness is assessed on the 44 answered queries.

Based on the prior subject matter expert grading, 32 of the 44 answered queries were graded correct, a correctness rate of 72.7 percent. Validation conducted an independent review and reached a consistent result, classifying 29 correct, 11 incorrect, and 4 as requiring clarification, which is 72.5 percent of the 40 classifiable queries. Both results clear the 67 percent threshold.

The model owner separately reported approximately 93.5 percent, reached by reclassifying 13 answered responses to not applicable and excluding them from the denominator. Validation's position is that a response that reaches the user and gives incorrect information is incorrect regardless of the underlying cause; the cause should be documented alongside the grade but does not remove the response from the denominator. Validation relies on the 72.7 percent rate, with the denominator stated above.

A set of healthcare related queries that had been reclassified to not applicable are treated as correct under the agreed methodology, that a helpful answer grounded in the knowledge base is correct. [TBD: Confirm the final grades for these queries against the model owner's updated subject matter expert grading once received.] The combined answer behavior observed in some of these queries is assessed in the Validation Commentary below.

