## Negative Feedback Handling (Recommendation Rejection)

Carl explained the rejection workflow for recommendations. When a banker provides negative feedback (rejection) on a recommendation, the system retains the rejection in the database with a rejected status. That recommendation will no longer appear for that specific customer ID. The selling point associated with the rejected recommendation is also suppressed for that customer, though the same selling point may still be served to other customers if their context maps to the same product. Jordan confirmed: the rejection is per-customer, not global. If two customers share the same customer context and are both recommended the same product, a rejection by one customer does not affect the other.

