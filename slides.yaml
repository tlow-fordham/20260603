## Retrieval Algorithm: Dense Search vs Hybrid Retrieval

Aditi raised the discrepancy between the MDD, which describes dense search, and the code, which uses hybrid retrieval. Carl clarified that rag_plus_generator.py is not the active code path; the production code uses rag_feature_generator.py. However, Carl confirmed the retrieval is hybrid: the primary method is text embedding search (vector-based), supplemented by a secondary entity-link retrieval based on document entity relationships. The entity-link retrieval supplements the vector search to include as many relevant chunks as possible.

Bhavya agreed to update the MDD (Section 6.2, retrieval strategy) to reflect the hybrid approach. Carl asked Bhavya to send him the latest document so he can make the update.

