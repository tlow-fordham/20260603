# Provisional Approval Report (PA2) - Model-7306 PayVIEW - GTM and MMP ChatBot

Draft, 06/19/2026. Internal Validation draft. Not for distribution.
Recommended outcome: Approved with Restriction. Pilot period: 07/06/2026 through 11/01/2026.

This report follows the structure of the original Provisional Approval (PA1) report and is scoped to the change under review. Unchanged elements are asserted concisely with reference to the PA1 report rather than re-documented.

---

## Executive Summary

This report documents Model Risk Management (MRM) Validation's second Provisional Approval (PA2) review of Model-7306, PayVIEW - GTM and MMP ChatBot. It covers one change to the model: the Combined Answer. Under the original Provisional Approval, signed 01/30/2026, the model presented up to four separate candidate answers and their notes to the agent. The model now adds an additional generative large language model call that synthesizes those candidate answers and notes into a single newly generated combined answer with inline source citations.

Material changes to the model during the pilot were not permitted under the terms of the original Provisional Approval. The combined answer was nonetheless shown to pilot users from the start of the pilot on 05/04/2026 without the required separate approval. The Special Purpose Validation Outcome Form, signed 05/19/2026, reiterated that the combined answer change specifically was not approved and required separate documentation and approval before deployment. Model Risk Governance (MRG) determined the change material, and the business line disabled the model through a backend feature flag on 06/15/2026 pending this review. This PA2 is scoped to the combined answer change and to continued, expanded pilot use.

Validation reviewed the updated pilot performance for the combined answer output on 72 unique queries. On the finalized subject matter expert grading, the combined answer was correct on 36, incorrect on 3, and partially correct on 1, with 32 abstentions, a correctness rate of 90 percent on the 40 answered queries, which clears the 67 percent pilot threshold. Validation has no concerns that would prevent continued pilot use prior to a full validation and recommends an Approved with Restriction outcome through 11/01/2026. The comprehensive assessment will follow in the Initial Validation. Validation's recommendations on the change are documented in the Conclusion.

## Model Purpose and Usage

The model assists sales agents in answering Global Treasury Management (GTM) and Money Movement Platform (MMP) questions using the bank's knowledge base articles. It is employee facing, and agents review the model's output before relaying information to a customer. The model purpose and usage are unchanged from the original Provisional Approval; refer to the PA1 report for the full description.

## Model Theory and Construction

The retrieval augmented generation framework, embedding models, cache mechanism, gateway access, and foundation large language model are unchanged from the original Provisional Approval and are described in the PA1 report.

The change under this review is the addition of a new generative large language model call that produces the combined answer. The up-to-four candidate answers and their notes produced by the approved process are passed to the foundation large language model (GPT-4o) in an additional call that generates a single combined answer, consolidating duplicative content and preserving inline source citations. This is a generation step rather than a deterministic concatenation: the combined answer is newly generated text produced by the model from the candidate answers and notes. When only one candidate answer is available, the model formats it directly without the synthesis call. When no answer can be grounded, the model indicates that it could not find an answer and prompts the agent to verify manually. Which output is presented, the combined answer or the four separate answers, is selected by a backend, code level toggle that is internal and not user facing. This output-selection toggle is distinct from the feature flag the business line used to disable the Query Agent pending this review.

### Combined answer synthesis prompt

The system prompt and instruction used for the combined answer generation call are reproduced below as provided by the model development team.

System prompt, wrapped in Llama-2 style system tags:

```
<|SYS|>
You are a helpful, respectful and honest assistant. Always answer as helpfully as possible, while being safe. Your answers should not include any harmful, unethical, racist, sexist, toxic, dangerous, or illegal content. Please ensure that your responses are socially unbiased and positive in nature.
If a question does not make any sense, or is not factually coherent, explain why instead of answering something not correct. If you don't know the answer to a question, please don't share false information.
<</SYS>>
```

Instruction:

```
Question: {query}
Answers: {answers}
The above HTML snippet contains multiple answers from a RAG system in response to the question.
Task: Combine these answers into one cohesive paragraph with appropriate citations to answer the question.
Output guidelines: Merge repetitive content smoothly. Return the answer as a valid HTML. Add inline <a> citations in parentheses immediately after the sentences they support.
```

### Validation analysis of the synthesis prompt

Validation reviewed the synthesis prompt against standard prompt construction practices. The assessment is organized by practice below. These are recommendations for strengthening the prompt and do not, on their own, prevent the pilot from resuming.

1. Role specification (persona). The prompt defines a generic persona, "a helpful, respectful and honest assistant." It is not scoped to the Global Treasury Management and Money Movement Platform domain or to the task of consolidating retrieved answers, so it does not set domain vocabulary or precision expectations.
2. Explicit task description. The task is stated, to combine the answers into one cohesive paragraph with citations, but it does not state the downstream use, that the output is presented to a sales agent who relies on it, and it is described at a high level.
3. Delimiters. The candidate answers are passed as a single HTML snippet in the Answers field with no delimiters separating one answer from another and no marker separating the instruction from the data. This contributes to the lack of per-answer traceability noted in the Risk Mitigation section.
4. Constraints, positive and negative. The prompt includes positive constraints, to merge repetitive content, return valid HTML, and add inline citations, but no negative constraints. It does not instruct the model to use only the content of the provided answers, nor to avoid presenting an answer when the candidates contain none. The absence of these constraints is directly related to the combined answer behavior assessed in the Risk Mitigation section.
5. Few-shot examples. The prompt contains no examples of an acceptable combined answer, so the model is not shown the intended structure, level of detail, or citation behavior.
6. Output format specification. An output format is specified, a single valid HTML paragraph with inline anchor tag citations. The format is a prose paragraph rather than a structured, parseable format, and Validation observed that the citations render as empty parentheses in the non-HTML formats used for review.
7. Enumeration of required content. The prompt does not enumerate what the combined answer must preserve from the inputs, for example that each distinct grounded fact be retained and that no fact be introduced that is not in the inputs. What is included is left to the model.
8. Error handling and disambiguation. The prompt provides only generic safety handling, "if you don't know the answer, do not share false information." It does not handle the case where the provided answers contain no grounded answer, for example "I could not find a specific answer," and it does not disambiguate conflicting answers. This is the most material gap for this use case and is tied to the failed-article content reaching the combined output.
9. Self-verification. The prompt does not ask the model to verify that the combined answer is supported by the provided answers or that the citations correspond to real sources.

Given that this is a low-risk model and that GPT-4o is an advanced large language model capable of producing a coherent combined answer from the candidate answers even with a minimal prompt, and given that the pilot results were within the correctness threshold, Validation has no concerns with the synthesis prompt for the pilot. However, Validation recommends that the prompt be strengthened, in particular by adding explicit handling for unanswered inputs (item 8) and a constraint to ground the combined answer only in the provided answers (item 4), by adding per-article delimiters to the input (item 3), and by adapting the Llama-2 chat formatting to the GPT-4o interface, since GPT-4o does not interpret the Llama-2 system tags as a control structure and the prompt appears carried over from the prior Llama-2 based implementation. These recommendations are consolidated in the Conclusion and will be assessed further during the Initial Validation.

## Development Data

The development data and the retrieval corpus are unchanged from the original Provisional Approval; refer to the PA1 report. The pilot corpus comprises 526 knowledge base articles, the same set used for the original Provisional Approval and within the 800 article pilot limit. The combined answer change operates on the candidate answers already produced and does not alter the data sources or retrieval.

## Model Performance

Validation reviewed the pilot performance data for the combined answer output. The subject matter expert test set comprises 82 query instances, which reduce to 72 unique queries after removing 7 groups of exact duplicate queries; the duplicate queries received consistent grades, and all figures in this section are reported on the 72 unique queries. On the finalized subject matter expert grading, which Validation reviewed and concurs with, the combined answer was correct on 36 queries, incorrect on 3, and partially correct on 1, with 32 queries where the model abstained. On the 40 answered queries this is a correctness rate of 90 percent, which clears the 67 percent pilot threshold.

To support the change, the subject matter expert graded both the combined answer and the four individual candidate answers on the same 72 unique queries. N/A denotes an answer slot that produced no answer, and for the combined and aggregate rows an abstention. The aggregate row applies a conservative rule across the four candidates, counting a query incorrect if any candidate is incorrect, N/A if all four are N/A, and correct otherwise.

| Output | Correct | Incorrect | Partially correct | N/A |
|---|---|---|---|---|
| Candidate 1 | 26 (36.1%) | 1 (1.4%) | 0 | 45 (62.5%) |
| Candidate 2 | 18 (25.0%) | 2 (2.8%) | 0 | 52 (72.2%) |
| Candidate 3 | 18 (25.0%) | 1 (1.4%) | 0 | 53 (73.6%) |
| Candidate 4 | 17 (23.6%) | 4 (5.6%) | 0 | 51 (70.8%) |
| Combined answer | 36 (50.0%) | 3 (4.2%) | 1 (1.4%) | 32 (44.4%) |
| Four-candidate aggregate | 35 (48.6%) | 7 (9.7%) | 0 | 30 (41.7%) |

On the answered rows, the combined answer, 36 of 40, is comparable in correct rate to the four answer aggregate, 35 of 42, and has a lower incorrect share, and both clear the 67 percent threshold. This supports that the synthesis step does not degrade the four answer output and does not increase the number of incorrect answers presented to the agent. Ground truth reference answers to support the automated correctness metric are [TBD: pending from the model development team]; these are needed for the Initial Validation and are not a precondition for this provisional approval.

### Validation Commentary on the Combined Answer

The model owner and model development team state that the combined answer is synthesized from up to four candidate answers and their reflexion notes, with the reflexion step acting as a sanitizer that removes unsupported claims and preserves valid content. Per the updated PA2 form, when a per-article response is "I could not find a specific answer to your question in this article. Please verify manually," and when it is "I don't know," that entry is excluded from the combined answer. Where no combined answer can be derived, the user interface indicates this and presents the synopsis and the relevant links.

Validation independently reviewed the combined answer generation code and found that the reflexion notes passed into the synthesis step are collected only from articles whose per-article answer did not find an answer. The reflexion step is the model's control against ungrounded content: it grades each per-article answer and returns a no-answer disclaimer when the answer is not confidently supported by its article. These notes contain candidate content extracted from the retrieved article. Carrying the notes from candidates that did not pass into the combined answer bypasses this control and reintroduces article-derived content that the model itself flagged as low confidence. As a result, the combined answer can present content carried from articles for which the model reported it could not find an answer, both when all per-article answers fail and when only some fail. Validation identified specific examples in the pilot data. In the VantagePoint query, all four per-article answers were "I could not find a specific answer," yet the combined answer presented a substantive description of the product. In a healthcare use cases query, three of the four per-article answers were "I could not find" and only one produced an answer, yet the combined answer presented use cases carried from the three articles that reported no answer. Presenting material from articles the model reported it could not answer overrides the per-article confidence signal. This is inconsistent with the statement that the model only provides an answer when it is confident of its containment and accuracy, and it can surface content that is not grounded in a successful retrieval. Validation reviewed the source citations and confirmed that in the agent user interface they render as numbered, clickable links to the source articles; the empty parentheses observed during review appear only in the evaluation export, where the link labels are stripped. The per-article inputs to the combined answer were combined into a single field in that export and were not individually traceable.

Validation quantified the extent of this behavior across the 72 unique queries, using a large language model based judge (GPT-5.1) to compare each combined answer to the candidate answers and their notes. A low confidence note, labeled "Possibly:" in the output, is the note the reflexion step generates for a per-article answer it did not pass; it contains candidate content extracted from the retrieved article that the model was not confident is directly supported by that article. The queries fall into four categories by reflexion outcome:

| Category | Description | Queries |
|---|---|---|
| A | At least one direct answer, no low confidence notes | 19 |
| B | At least one direct answer and at least one reflexion-failed low confidence note | 23 |
| C | All candidates failed the reflexion step, low confidence notes generated | 13 |
| D | All candidates failed the reflexion step, no low confidence notes | 17 |

Categories B and C are grouped because they are the queries that carry at least one low confidence note, whether or not another candidate answered, and so are the population in which a low confidence note can reach the combined answer; categories A and D carry no such note. Across these 36 queries, on 22 the combined answer still presented a substantive answer to the agent rather than abstaining. Cross-referencing the four combined answers the subject matter expert graded incorrect or partially correct against this analysis:

| Query | SME assessment | Drew on reflexion-failed content | Root cause |
|---|---|---|---|
| 15077c49 | Partially correct | Yes | Reflexion-failed note added an unsupported claim |
| ee682b9c | Incorrect | No | Passed the reflexion step but does not address the query; the retrieved article lacks the needed information |
| a669cf60 | Incorrect | No | Passed the reflexion step but does not address the query; the retrieved article lacks the needed information |
| f6cc01d1 | Incorrect | No | Passed the reflexion step but does not address the query; the retrieved article lacks the needed information |

Three of the four incorrect or partially correct combined answers drew only on a candidate that passed the reflexion step. In each, the surfaced answer was supported by its source article but did not address the user's query, and the retrieved article did not contain the information needed to answer it. The reflexion step verifies that an answer is supported by its source article; it does not verify that the article is relevant to the query, so a supported but off-query answer passes and the model does not abstain. This is either a retrieval ranking issue, where a covering article exists but was not surfaced, or a knowledge base coverage gap, where no covering article exists. Validation is not positioned to make that determination; the model owner should identify the root cause through their subject matter expert root cause analysis. These arise in the existing retrieval and knowledge base rather than in the combined answer change. One case, 15077c49, is a confirmed instance of a reflexion-failed note degrading the combined answer from correct to partially correct, where a low confidence note added a claim the model's own notes had flagged as unsupported. Across the 72 queries, the combined answer drew on a reflexion-failed note in 22 of the 36 applicable queries; these did not drive the incorrect outcomes in this sample, but they carry content the reflexion control flagged as low confidence into the user-facing answer, which is a latent risk to answer quality.

In response, the model development team acknowledged the behavior and, following Validation's recommendation, made two changes to the combined answer generation so that the reflexion guardrail takes effect on the combined answer. The primary change, in the combined answer routine (get_Concatenated_and_Combined_Answer), filters out any per-article entry that did not produce a valid answer and instead returned the reflexion disclaimer, so that those entries and their notes no longer feed the combined answer generation. When every entry is excluded, the routine returns an empty answer rather than generating one. It distinguishes a valid answer from a disclaimer using the model's existing answer formatting. The secondary change, in the concatenation routine (concatenate_final_answers), adds the reflexion disclaimer phrase to the list of low confidence phrases that are excluded and corrects a latent list error, reinforcing the primary change. Validation reviewed the updated code and confirmed that content from an article whose per-article answer did not find an answer is now excluded from the combined answer. The source citations were confirmed to render as numbered, clickable links in the agent user interface, with the empty labels limited to the evaluation export. The model development team will add per-article delimiters to the export for traceability during root cause analysis; this is captured in the Conclusion.

Validation notes that these results are based on a small sample. Within that sample, the correctness of the combined answer is comparable to, and slightly better than, the four answer output approved under the original Provisional Approval. On the model framework and theory, correcting the defects that prevent the reflexion, or Verbal Reinforcement Learning, guardrail from taking effect on the notes of unanswered articles is sound, since it restores that control to the final combined answer so that content the model flagged as low confidence is not carried forward. In the pilot sample, only one of the 72 queries would have been graded higher had this correction been in place, and the sound practice is nonetheless to correct each defect as it surfaces. The model development team corrected the defects identified during the PA2 engagement following Validation's recommendation. Given the low-risk, employee facing use with agent review before any customer relay, the correctness within the pilot threshold, and the correction of the identified defects, Validation has no concerns with the combined answer for the pilot. The off-query answers arise in the existing retrieval and knowledge base rather than in the change under review, and are noted for the model owner and for the Initial Validation. The recommendations are consolidated in the Conclusion.

## Risk Mitigation

The risk mitigations from the original Provisional Approval remain in effect and are unchanged: employee facing use with agent review before any customer relay, a limited group of trained and experienced agents, a curated set of pre approved knowledge base articles that contain no customer data with source links preserved, access through the bank's GenAI gateway providing authentication, logging, and content filtering, profanity filtering, and prompt injection controls. The combined answer change adds a synthesis step downstream of the already grounded candidate answers and does not alter these controls. The model's grounding control is the reflexion step, a verbal reinforcement step applied on the foundation model that grades each per-article answer. In the combined answer, the synthesis is performed on the per-article answers together with their reflexion notes. The model development team's position is that presenting the notes alongside a valid answer is intended, consistent with the phrase "answer along with notes" in the PA2 form. The separate behavior in which content from an article that did not produce an answer reached the combined answer was a defect the model development team has corrected, and is assessed under Model Performance.

The following early engagement observations are provided for the model owner's consideration and are not formal validation conclusions. The combined answer was deployed before the required approval, which the business line has remediated by disabling the model pending this review. Some pilot knowledge base links return access errors or no longer exist, and the business line will communicate knowledge base article changes going forward.

