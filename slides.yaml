Hi all,

Ahead of Thursday's session, here is a proposed agenda so we can make the most of the 30 minutes. The goal is to align on the validation path for the combined answer change and the Initial Validation, how correctness is being measured, and a realistic documentation timeline. Happy to adjust if there are other items you would like to cover.

## 1. Validation path, sequence, and PA2 form (7 min)

The combined answer change is being reviewed first through a second Provisional Approval (PA2), scoped to the added summarization step. The Initial Validation then proceeds once the model documentation is complete. The aim of this item is to confirm that shared sequence and the documentation standard the IV will assess against (the GenAI and Agentic AI Model Development Template), so expectations are aligned on both sides.

1. Confirm the path: PA2 for the combined answer change, then Initial Validation once documentation is complete.
2. Confirm the standard the IV assesses against and that PA-level requirements are lighter than IV-level requirements.
3. PA2 form gaps: Validation has returned comments on the draft form (stale PA1 dates and decision fields, the Section 5 line that still describes the combined answer as a future step, the milestone dates, and the Change EMA). Confirm the MO will incorporate these so the PA2 can proceed.

## 2. Correctness methodology and evaluation data (11 min)

Validation has reviewed the pilot grading and would like to align on how correctness is classified going forward, so the metric is consistent through PA2 and IV. Validation's review of the prior grading puts correctness at 72.7%, which clears the 67% PA threshold; this is a methodology alignment rather than a pass or fail question at this stage.

1. Align on the principle that a response counts as N/A only when the model returns no answer, and that a wrong answer is classified as Incorrect with the root cause noted alongside it.
2. Review the reclassified queries and the side-by-side grading of the four-answer and combined-answer outputs (the pairwise comparison) with the SME in a separate working session. Action: set a date for that session.
3. Evaluation data integrity: two queries in the dataset initially showed no source links or retrieved context, which on re-pull turned out to be present but dropped from the export. Because the SME grades correctness from this data, and Validation assesses whether answers are grounded in the knowledge base using the link and context fields, we would like to understand what happened on the backend for those two queries and whether other rows could be affected. Action: re-pull the full dataset with complete link and context fields so the SME grading and the grounding assessment rest on reliable data.

## 3. IV documentation quality, performance results, and timeline (12 min)

The Model Development Document, Monitoring Plan, and Implementation Framework were targeted for 06/15. To begin the Initial Validation, Validation needs the documentation substantially complete and at IV depth, with the performance/outcome analysis and the development data and knowledge base coverage being the key areas.

1. Walk through the completeness and quality of the recent submission against the IV requirements, including the performance testing results provided and whether they meet IV depth (sample size, comprehensive metrics, and alignment between automated and SME evaluation).
2. Confirm the expectation that protects the timeline: the model is frozen at IV kickoff. Any change introduced during the validation requires re-scoping and will extend the conclusion date.
3. Given the documentation gaps, the MD will need time to enhance and resubmit. Please provide a new ETA for the enhanced submission, particularly the outcome analysis and the Section 5 development data and KB article coverage. If the target submission date is not ready in the meeting, we ask the MD to come back with it within a day so Validation can plan the review window. From that submission date and the PA2 step now ahead of the IV, we can set revised validation dates, holding the 11/01/2026 pilot end date fixed.

Thanks, and see everyone Thursday.

