## Automated Selling Point Fetch Verification

Jinjun raised the question of how the model owner can verify at scale whether the correct selling point is being fetched for each customer profile. With approximately 1,000 pilot transactions, manual SME review of every interaction is not feasible. He asked whether the team has an automated evaluation that confirms the fetched selling point matches the expected cached entry.

MD explained that the system operates as a two-step process: first, a rules-based recommendation layer evaluates the customer profile and determines which product to recommend; second, the system retrieves the corresponding pre-generated selling point from cache, but only when certain products (Talech/Elavon products) are recommended. Selling points are not directly mapped to customer profiles; they are mapped to recommended products. The recommendation drives which selling point is fetched.

Carl Huang confirmed that automated functional tests exist for the recommendation layer. These tests are hard-coded against expected outcomes and run for every UAT release. However, these tests check the recommendation correctness only, not the selling point content. The selling point endpoint is checked structurally (valid response format) but not for content correctness.

Jinjun explained the rationale for an automated check: if an automated test confirms the correct selling point is fetched for all interactions, SME review is only needed for the pre-generated selling points themselves (the 172 cached entries), not for every production interaction. If the automated test shows 100 percent correctness, SME does not need to sample production interactions.

Carl noted that running automated tests against production is not advisable because test traffic would be recorded in the API transactions table and would consume rate-limited capacity. Any such testing would need to use UAT. He also noted that building a selling-point-fetch verification would follow the same code path as the production system (query customer context, evaluate rules, fetch selling point, compare), so the test would essentially re-execute production logic.

Jordan noted that since the system follows a deterministic code path, the same input produces the same output. The group agreed to add the item to the tracker for the development team to evaluate feasibility.

