## Executive Summary

This report documents Model Risk Management (MRM) Validation's second Provisional Approval (PA2) review of Model-7306, PayVIEW - GTM and MMP ChatBot. It covers one change to the model: the Combined Answer. Under the original Provisional Approval, signed 01/30/2026, the model presented up to four separate candidate answers to the agent. The model now adds a generative synthesis step that merges those candidate answers into a single combined answer with inline source citations.

The combined answer was deployed during the pilot before it received the separate approval required by the Special Purpose Validation Outcome Form, signed 05/19/2026. Model Risk Governance (MRG) determined the change material, and the business line disabled the model through a backend feature flag pending this review. This PA2 is scoped to the combined answer change and to continued, expanded pilot use.

Validation reviewed the updated pilot performance for the combined answer output. Correctness is 72.7 percent on the deduplicated answered queries, which clears the 67 percent pilot threshold. Validation has no concerns that would prevent continued pilot use prior to a full validation and recommends an Approved with Restriction outcome through 11/01/2026. The comprehensive assessment will follow in the Initial Validation.

## Model Purpose and Usage

The model assists sales agents in answering Global Treasury Management (GTM) and Money Movement Platform (MMP) questions using the bank's knowledge base articles. It is employee facing, and agents review the model's output before relaying information to a customer. The model purpose and usage are unchanged from the original Provisional Approval; refer to the PA1 report for the full description.

## Model Theory and Construction

The retrieval augmented generation framework, embedding models, cache mechanism, gateway access, and foundation large language model are unchanged from the original Provisional Approval and are described in the PA1 report.

The change under this review is the addition of a generative synthesis step. The up-to-four grounded candidate answers produced by the approved process are passed to the foundation large language model (GPT-4o) with an instruction to merge them into a single combined answer, consolidating duplicative content and preserving inline source citations. When only one candidate answer is available, the model formats it directly without synthesis. When no answer can be grounded, the model indicates that it could not find an answer and prompts the agent to verify manually. A backend, code level toggle controls whether the combined answer or the four separate answers are displayed; the toggle is not user facing.

