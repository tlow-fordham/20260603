## Correctness methodology

- The model owner and Validation aligned on how query responses are graded for correctness, so that the approach is understood and applied consistently. The goal is to measure the model's performance accurately, not to reach a particular threshold.
- A response is graded not applicable when the model does not provide a specific answer, for example a blank response, a zero, a statement that it does not know, or a direction to check the links. Not applicable responses are excluded from both the numerator and the denominator and are neither correct nor incorrect.
- A response is graded correct or incorrect only when the model provides a specific answer. For incorrect responses, the root cause is documented, for example incorrect links, a missing knowledge base article, or an error within an existing article.
- Where the model returns a helpful answer that is grounded in the knowledge base and contains no material errors, the response is graded correct, even if the underlying question is broad or only partially within the intended scope. The example discussed was a request for product recommendations for a healthcare client: the model does not make client specific recommendations, but it correctly returns the documented ideal client profile information, which is graded correct.
- Validation's independent evaluation of the combined answer output is 72.7 percent correct, which clears the 67 percent threshold and does not block expansion of the pilot population.
- The parties agreed to document the methodology so it is applied consistently by current and future subject matter experts.

## Two queries with missing links and context

- Two queries had previously shown no source links or retrieved context and could not be scored. The model development team traced this to an error in the spreadsheet used to compile the links rather than to the model. According to the team, the combined answer link field did not consolidate the links across the candidate answers, and for those rows the links and context were left empty, which prevented the automated metrics from computing.
- The model development team re-gathered the links and context and re-ran the automated evaluation to recompute the metrics. The team stated that the agent would have seen the links in the live tool and that the gap was in the evaluation spreadsheet only. Validation will confirm complete capture of the link and context fields across the dataset.
- One of these two queries is the healthcare product recommendation example. Consistent with the methodology above, it is graded correct, which reverts an earlier not applicable.

## Pairwise comparison of the combined answer and the four answer output

- To support the change, the four individual candidate answers will be graded for correctness alongside the combined answer so the two versions can be compared on the same queries.
- The business line's position is that the combined answer's value is a single, clearer, more digestible response that is easier for the agent to use. Validation's position is that it is prudent to confirm the combined answer remains accurate and does not, for example, merge terms from two different candidate answers that concern different products or subjects with opposing content. The purpose of the comparison is therefore to confirm that the combined answer preserves the same information as the approved four answer output without introducing errors when the answers are merged. The comparison is not intended to determine which format is preferable.
- The model development team will join the four answer outputs and the combined answer outputs into a single sheet so the subject matter expert can grade both efficiently. For most queries only one candidate answer is relevant, so the additional grading is expected to be quick. A sampling approach will be used if the data volume grows.

