### Validation Commentary on the Combined Answer

The model owner and model development team state that the combined answer is synthesized from up to four candidate answers and their reflexion notes, with the reflexion step acting as a sanitizer that removes unsupported claims and preserves valid content. Per the PA2 form, where no definitive answer can be derived the system indicates this explicitly and continues to present the relevant source links, and the reflexion notes are retained when a per-article response is "I could not find a specific answer to your question in this article. Please verify manually," while "I don't know" entries are dropped.

Validation independently reviewed the combined answer generation code and found that the reflexion notes passed into the synthesis step are collected only from articles whose per-article answer did not find an answer. As a result, the combined answer can present content carried from articles for which the model reported it could not find an answer, both when all per-article answers fail and when only some fail. Validation identified specific examples in the pilot data. In the VantagePoint query, all four per-article answers were "I could not find a specific answer," yet the combined answer presented a substantive description of the product. In a healthcare use cases query, three of the four per-article answers were "I could not find" and only one produced an answer, yet the combined answer presented use cases carried from the three articles that reported no answer. Presenting material from articles the model reported it could not answer overrides the per-article confidence signal. This is inconsistent with the statement that the model only provides an answer when it is confident of its containment and accuracy, and it can surface content that is not grounded in a successful retrieval. Validation also found that the source citations were not visible in the formats used for review and that the per-article inputs to the combined answer were not individually traceable.

In response, the model development team acknowledged the behavior and agreed that an article that did not produce an answer should not contribute content to the combined answer. The team committed to correct the behavior so that content from such an article does not appear in the combined answer, while continuing to present the article links, to make the source citations visible in the review formats, and to add the per-article inputs with delimiters identifying each article. [TBD: confirm this correction is implemented prior to PA2 pilot production.]

Given that this is a low-risk, employee facing model with agent review before any customer use, Validation has no concerns with the combined answer behavior for the pilot, contingent on the correction being implemented and confirmed prior to pilot production and on the subject matter expert testing confirming the affected cases. [TBD: confirm the subject matter expert results on the no-answer and partial-answer cases.] These recommendations are consolidated in the Conclusion.

## Risk Mitigation

The risk mitigations from the original Provisional Approval remain in effect and are unchanged: employee facing use with agent review before any customer relay, a limited group of trained and experienced agents, a curated set of pre approved knowledge base articles that contain no customer data with source links preserved, access through the bank's GenAI gateway providing authentication, logging, and content filtering, profanity filtering, and prompt injection controls. The combined answer change adds a synthesis step downstream of the already grounded candidate answers and does not alter these controls. The model's grounding control is the reflexion step, a verbal reinforcement step applied on the foundation model that grades each per-article answer. In the combined answer, the synthesis is performed on the per-article answers together with their reflexion notes. The model development team's position is that presenting the notes alongside a valid answer is intended, consistent with the phrase "answer along with notes" in the PA2 form. The separate behavior in which content from an article that did not produce an answer reaches the combined answer is a defect the model development team has agreed to correct, and is assessed under Model Performance.

The following early engagement observations are provided for the model owner's consideration and are not formal validation conclusions. The combined answer was deployed before the required approval, which the business line has remediated by disabling the model pending this review. Some pilot knowledge base links return access errors or no longer exist, and the business line will communicate knowledge base article changes going forward.

