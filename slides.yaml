The 9 prior-Incorrect queries cite six different rationales, all treated identically as N/A exclusions despite representing different failure modes the model encounters in production.

The 4 prior-Correct queries (rows 10-13) were reclassified with no documented reasoning. Rows 10-12 have among the strongest RAGAS scores in the dataset, with 3-6 resolved KB links each. The model retrieved Healthcare Revenue Cycle and Patient Payments pages and generated detailed answers citing specific products. If the rationale is that healthcare is outside the GTM/MMP query scope, removing correct responses reduces demonstrated coverage, and the model giving confident advice on an out-of-scope topic is itself worth documenting.

Apart from the one Incorrect-to-Correct change (CPO prerequisites), the entire movement from 72.7% to 93.5% was achieved by denominator reduction rather than by correcting grading errors.


Question for the development team

Two queries have zero resolved links and zero retrieved context, yet the model returned substantive answers.

| Query | Links | Context | AR | CR | Faith | Prior | Updated |
|---|---|---|---|---|---|---|---|
| Healthcare use cases - "solutions to offer?" | 0 | empty | 0.8 | 0 | 0 | Correct | N/A |
| What is vantage point? | 0 | 0 | 0 | 0 | 0 | Correct | Correct |

The data shows no retrieved context and no resolved links, but the model generated substantive answers. It is unclear whether the retrieval step returned nothing and the model answered without KB content, or whether context was retrieved but not captured in the data export. If the architecture includes a Verified Response Logic layer that gates responses on retrieved context, could you clarify how these two queries produced answers?


To be clear, 72.7% still clears the 67% threshold from the original PA. This is a methodology question, not a pass/fail concern. We would like to align on the classification approach before the PA2 submission so the correctness metric is consistent going forward.

