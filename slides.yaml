## Feedback Table Review

Jordan walked through observations from the feedback export (96 rows).

**"Other reason" free-text not captured.** All 8 rows with "Other reason" contain only the label, with no additional free-form comment. The Salesforce UI has a text box for "Other reason," but the text is not transmitted to the recommender system. Carl Huang confirmed this is a known limitation. Bhavya noted that Arunkumar had indicated BCRM only recently launched the feedback integration (approximately one week prior), which may explain why the free-text field is not yet being passed through. Bhavya agreed to coordinate with BCRM to enable transmission of the free-text input.

**Object ID mapping and filtering.** Jordan noted that one object ID (36806890) accounts for 69 of the 96 feedback rows and asked what it represents. Carl initially noted the object ID may originate from the data pipeline, but after checking the database during the meeting, confirmed that object ID corresponds to the feedback target ID, which maps to the recommendation ID. Three object IDs were identified as money movement (static, non-LLM) recommendations. Carl provided the full IDs in the meeting chat:
- 241ab87a-6c1d-4188-94a9-cd88ea36bd90
- 36806890-7ea5-4ccf-a3f3-fd7d4921e264
- 38c2282b-93ff-48fc-8375-f358b7432be1

Jordan asked the group to filter out the three money movement object IDs. Excluding those leaves approximately 9 feedback rows tied to LLM-generated Talech/Elavon product recommendations. These are the rows relevant for monitoring selling point quality. Carl confirmed that the money movement recommendations use only static selling points and are not related to the LLM-generated content.

Carl shared his screen and connected to the production database to show a breakdown of feedback by product and rejection reason. Bhavya noted that this type of reporting will be available in the BI dashboard once finalized.

**Feedback scope.** Bhavya reiterated that all feedback is tied to the product recommendation, not the selling point text. The feedback mechanism captures whether the banker accepts or rejects the recommended product. The group discussed which feedback categories are most informative:
- "Not interested at this time" and "not interested ever" reflect normal sales outcomes.
- "Not an applicable product" may indicate a recommendation quality issue.
- "Other reason" would be the most likely signal for selling-point-related concerns; currently no entries exist in this category.
- "Unresponsive" may indicate a technical issue.

