## Background Recap

- Jordan recapped the timeline for context, given multiple personnel changes across MO, MD, and MRO since the original PA.
- PA1 was signed 01/30/2026 based on Soumitri's query agent framework, with four individual RAG answers as the approved output.
- SPV was signed 05/19/2026. The SPV explicitly stated that the combined answer (summarizing the four answers into one output via an additional LLM call) was not covered by the provisional approval and had not been deployed.
- Through email exchanges on 06/10 and 06/11/2026, Jaya explained the combined answer architecture and explicitly confirmed that the backend toggle is set to display only the combined answer on the UI. The combined answer has been the only output users see for approximately three weeks.
- From Validation's perspective, this is a framework change because it introduces an additional generative AI model call. Validation has not had the opportunity to review the summarization prompt or assess the combined answer output prior to deployment.

## MRO Status

- Patty Manirath is transitioning to a new position within the bank. She previously took over the MRO role from Fion Wang. There is no replacement MRO assigned yet, but Patty is still supporting the role during the transition.

## Change Classification

- Patty confirmed that the change meets the definition of a material change under the PA terms.
- Patty noted that the material change was implemented without informing MRM or MRG, which is inconsistent with the terms agreed upon during the provisional approval.
- No one on the call disputed this characterization.

## Path Forward: Second Provisional Approval

- The MO and MD agreed to submit a new PA (PA2) focused on the combined answer change. The PA2 can reference and build on the existing PA1 narrative, appending the details on what changed (combined answer methodology, updated flow diagram, performance results).
- Validation (Jinjun, Jordan) confirmed they can expedite the review, targeting approximately two weeks for completion. The scope of review is limited to the change from four answers to the combined answer (one additional LLM call combining the outputs).
- Madhavi noted this may impact the full production timeline. Jordan clarified that it does not necessarily delay full production, because the MO can submit initial validation documents at any point when ready and does not have to use the full pilot period. The MO can start the full production process before the end of the second pilot window.

## Interim Measures: Rollback or Pause

- Madhavi recommended that the combined answer not be displayed to users until the PA2 is complete.
- Satish explained a technical constraint: the current UI is designed to display only one answer. Rolling back to display four separate answers would require UI development effort from Venkat's team and may not be quick.
- Two interim options were discussed:
  - Option 1: Have the UI team (Venkat) change the display back to four individual answers. Level of effort unknown.
  - Option 2: Stop the API entirely so no responses are served until the PA2 is complete.
- Jordan noted that the original PA did not require four separate UI display boxes. If the four answer text strings were concatenated into one display field without the LLM synthesis step, that would be consistent with the approved framework and would not break the existing UI.
- Justin agreed that removing the summary piece and reverting to the prior answer format should be feasible and committed to confirming with Venkat.
- Satish recommended that the business line make the rollback decision quickly. If rollback is not feasible, stopping the API is the fallback.
- Satish stated that the business line should provide an answer by end of day 06/15/2026.

## MRC Reporting

- Madhavi confirmed she will report the change to MRC regardless of whether rollback occurs, since the unapproved change was in use for approximately three weeks.
- If the business line rolls back the change, Madhavi's commentary to MRC will reflect that the rollback was completed promptly once the issue was identified. If rollback does not occur, the commentary will note continued use of an unapproved output.

## Controls and Process Discussion

- Patty raised concerns about how the business line can stay agile while complying with MRM requirements, and whether defining work as a proof of concept rather than a pilot would give more flexibility.
- Madhavi clarified the distinction: if work is a POC and not being presented to end users, it does not require MRM approval. However, once output is presented to users in a pilot capacity, it falls under the PA terms. POC testing can run alongside a pilot, and those results can be submitted with the pilot results for full validation. The key requirement is that material changes not be deployed to users without approval.
- Patty suggested that first line would benefit from documented standards or education on the appropriate approach for making changes during pilot, to avoid similar situations.
- Madhavi noted that MRG policy already distinguishes between pilot use and production use. POC activity that is not customer-facing does not require MRM approval.
- Satish acknowledged that personnel transitions (Soumitri's departure, Sherin joining as new MD, Justin replacing Philip as MO, Patty replacing Fion as MRO) contributed to the miscommunication that led to the change being deployed without approval.

## Change EMA

- May Tran noted that a new change EMA is needed for the pilot to capture the change and document it in Archer.
- The change EMA is Justin's responsibility as the assigned model owner. May offered to assist.

## Pilot Usage Context

- Jaya noted that only approximately five users are actively using the tool, and 82 queries were submitted over the three-week period. Madhavi acknowledged this but noted it does not reduce the governance risk.
- The pilot formally began around 05/04/2026. The combined answer change has been in use for approximately three weeks (roughly half the pilot period to date).

