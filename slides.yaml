## Conclusion

Validation reviewed the combined answer change and the updated pilot performance and held discussions with the model owner and the model development team. Based on Validation's preliminary review, the combined answer output performs within the pilot correctness threshold, and the controls from the original provisional approval remain in effect. Validation identified no immediate concerns that would prevent continued pilot use prior to completion of a full validation, contingent on the recommendations below that the model development team has committed to address before the pilot resumes and on the subject matter expert testing confirming the affected cases.

Validation recommends an Approved with Restriction outcome, permitting pilot use of the model with the combined answer output from 07/06/2026 through 11/01/2026, with a restriction effective date of 11/01/2026. The pilot is restricted to up to 28 experienced agents initially, and up to 148 agents contingent on a correctness rate of 67 percent or higher, limited to Global Treasury Management and Money Movement Platform queries and to the pre approved knowledge base article set. No further changes to the model framework, output, or scope are permitted during the pilot; any subsequent change requires a new Provisional Approval or submission for Initial Validation prior to deployment.

Validation recommends the following.

**Before the pilot resumes:**

- Correct the combined answer so that content from an article whose per-article answer did not produce an answer does not appear in the combined output. The model development team has committed to this correction; it is to be confirmed implemented prior to PA2 pilot production. [TBD: confirm implemented prior to PA2 pilot production.]
- Make the source citations visible in the formats used for review and logging, and add the per-article inputs to the combined answer with delimiters identifying each article. The model development team has committed to this change.

**During the pilot and before the Initial Validation:**

- Update the PA2 documentation to describe the implemented mechanism, including that content from unanswered articles is excluded from the combined output, and reconcile the statements that the system maintains transparency when no answer is derived and that the model only answers when confident with the corrected behavior.
- Correct the architecture description to reflect the implementation: the offline keyword extraction uses KeyBERT and HDBSCAN (node 1.4), and the runtime retrieval is an in-memory cosine similarity over stored embeddings rather than a vector database.
- Strengthen the combined answer synthesis prompt, including explicit handling for unanswered inputs (so that an "I could not find" answer is recognized and excluded), a constraint to ground the combined answer only in the provided answers, per-answer delimiters in the input, and adaptation of the prompt formatting to the GPT-4o interface. These will be assessed further during the Initial Validation.
- For the model owner's consideration: continue to communicate knowledge base article changes, given that some pilot links return access errors or no longer exist.

The next validation activity is the Initial Validation, to be conducted against the documentation milestones the model owner has set out in the provisional approval request. The model owner should submit the complete Initial Validation documentation package, consisting of the Model Development Document, the Monitoring Plan Document, and the Implementation Framework and Testing Document, sufficiently in advance of the intended full production date to allow the Initial Validation to be completed before the pilot concludes on 11/01/2026.
