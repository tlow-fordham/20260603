## Pilot Performance and Feedback

Aditi asked about the timeline for pilot performance data. Bhavya indicated end of July for the "Other reason" free-text feedback, noting that the feature was only recently enabled and insufficient data has accumulated.

Arunkumar clarified that the standard reject reasons (preset dropdown options) are the only feedback being collected. Bankers are not providing free-text feedback and have communicated that they do not have time to enter selling point ratings. The 1-to-5 rating committed to in the Provisional Approval was never implemented. All feedback collected is for the product recommendation, not the selling point content.

Xinyu raised the streamlined timeline: the previous 10-to-12 week IV timeline has been reduced to 6 to 8 weeks for low-risk models, meaning full documentation and testing should be complete before kickoff. Given the mid-August production date, the team has approximately 6 weeks, of which 1 to 2 weeks are needed for management review and sign-off, leaving approximately 4 weeks for validation work.

Xinyu asked whether the reject reasons are directly related to model performance. Bhavya confirmed they are for product recommendations, not the GenAI model. Xinyu stated that if the feedback is not directly related to model performance, it does not count toward the pilot performance assessment Validation is looking for. The model owner needs to evaluate whether the model output meets the business need.

Jordan noted that the SME has manually reviewed all 172 selling points, and since all outputs are cached with no live generation, the pilot does not provide additional insight beyond the SME review. Jordan added that Validation is confirming the feedback channel is now open for monitoring purposes, even though no selling point feedback has been collected. If feedback collection remains incomplete, Validation can raise a finding and impose a restriction; the finding would not affect the validation outcome.

Aditi asked Bhavya to document that the feedback described in the Provisional Approval (1-to-5 rating and free-text on selling points) was not implemented. Bhavya confirmed this has been updated in the latest Model Development Document.

