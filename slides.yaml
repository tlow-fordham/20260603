
# 4 Modeling Framework and Business Uses

This section summarizes the salient facts about the model, its components, its dependencies, and how it is used. Assessments are reserved for Part II.

Model-7468 GenAI Selling Points is a new, single-method model; it is not a model suite and contains no separately inventoried sub-models or segments. It generates personalized, product-specific selling points for Business Banking customers from customer attributes and underlying product documentation, supporting Sales and Business Banking teams by improving the relevance, consistency, and efficiency of product messaging. The model replaces a manual and template-based process for creating selling points; there is no incumbent automated system performing this function.

Outputs are internal-facing. They are surfaced to bankers within the Salesforce recommendation workflow through an application programming interface (API), and the model does not interact with customers. The scope covers Business Banking customers across the supported industries and revenue bands, mapped to the documented Elavon payment products, including Elavon Mobile, Elavon Terminal, and Elavon Register. The knowledge base comprises nine product documents (generic Talech documents rebranded to Elavon during processing) segmented into 28 chunks as documented, together with a curated selling-points source; the evaluation dataset comprises 172 queries. The data sources and inventory are assessed in Section 7.1. At full launch the model will be exposed to 527 bankers, nationwide within the United States. The count of supported industry and revenue segments is to be confirmed [TBD].

The model uses a hybrid architecture that combines a deterministic product recommender, a retrieval-augmented generation (RAG) component, a foundation large language model (LLM) for generation, and a production cache (see Figure 4.1). The deterministic recommender maps customer industry (North American Industry Classification System, or NAICS), sub-industry, and revenue band to a recommended product, plan, and key features through a predefined mapping table, so that identical inputs produce identical product selections. Customer attributes and the recommended product details are then assembled by a fixed template into a standardized query. Retrieval embeds the query using the text-embedding-ada-002 model (1,536 dimensions, deployed through Azure OpenAI) and compares it against product-document chunks stored in a PostgreSQL database with the pgvector extension. Retrieval is hybrid: the primary method is dense vector search over an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index, returning the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships; the combined set is re-ranked by a multi-factor relevance score before a final subset is passed to generation. Generation uses GPT-4o, accessed through the enterprise generative AI gateway, with no fine-tuning. Each output is a structured selling point consisting of a headline, a subheader, a body, bullet points, an optional disclaimer, the identifiers of the source documents used, and an effectiveness score.

