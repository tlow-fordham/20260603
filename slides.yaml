# Individual Career and Development Plan: Jordan Low

01/01/2026 - 12/31/2026 (Mid-Year Update, 06/30/2026)

---

## Explore Your Motivations

**Describe your career interests, whether you want to grow in your current role or prepare for a new one. Think of the aspects of your work that are most engaging, where you have the most opportunity to highlight your strengths and contribute your unique talents.**

I am at my best when I am building something that sits at the intersection of technology and governance: automation tooling that makes AI adoption faster and more defensible, evaluation frameworks that hold up under regulatory scrutiny, or a team member's ability to do both. In H1 2026, the work that energized me most combined hands-on GenAI engineering with cross-functional impact: standing up the team's GenAI validation automation codebase (AI CoE Intake #1286), delivering the bank's first agentic AI Provisional Approval (Model-7409), leading the Lumenova and Nimbus Uno platform evaluations, and co-leading the first-line presentation series on GenAI streamlining and change management. What these have in common is that they bridge the gap between building AI capabilities and governing them responsibly, and that bridge is where I contribute the most.

What drains my energy has not changed: extended meetings with too many participants and navigating organizational politics. I manage both better than I did a year ago, but they remain areas I tolerate rather than enjoy.

My career interests are growing toward roles where I can apply this combination of technology and governance at a broader organizational scale. I see the bank investing heavily in AI platforms, guardrail tooling, and adoption enablement, and I believe my experience evaluating these platforms, building automation on top of them, and stress-testing them against MRM requirements positions me to contribute more broadly to how AI is adopted and governed across the organization. I want to continue deepening my GenAI and agentic AI expertise while expanding the scope and visibility of my impact beyond the validation function.

