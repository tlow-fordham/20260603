## Internal Notes (not for external distribution)

### Feedback to give Jaya/Justin on the call

- The PA2 form is largely carried over from PA1, which is expected since the scope is the combined answer change. The new content (Combined Answer paragraph, system prompt, updated flow chart) is a good start, but the form needs cleanup before it can support a PA2 review.
- The justification paragraph after the system prompt needs to acknowledge why PA2 is being submitted. The current language frames the combined answer as a planned enhancement without mentioning that it was deployed without approval, identified by MRM, and discussed on 06/15. All parties agreed this is a material change. Proposed replacement language is in the comments.
- The milestone dates for IV documentation (MDD, Monitoring Plan, Implementation Framework all due 06/15) have passed. The MDD received is approximately 50-60% complete with Section 7.1 as the major gap, and the Monitoring Plan is mostly TBDs. These dates need to be revised in the PA2 form to reflect realistic delivery targets.
- The correctness methodology question (separate email to Justin) needs to be resolved before the PA2 performance narrative can be finalized. Validation's count is 32/44 = 72.7% on the prior grading. The updated grading (93.5%) was achieved by reclassifying 13 got-answer responses to N/A.
- The success criteria changed from 67% (PA1) to 87% (PA2 Section 4) without explanation. At 72.7%, the model clears 67% but not 87%. Need to understand the basis for this change.
- We still need the pairwise comparison (SME grades on both the 4-answer and combined answer output for the same queries) to assess whether the combined answer is performing comparably to the approved output.

