## Risk Mitigation

The risk mitigations from the original Provisional Approval remain in effect and are unchanged: employee facing use with agent review before any customer relay, a limited group of trained and experienced agents, a curated set of pre approved knowledge base articles that contain no customer data with source links preserved, access through the bank's GenAI gateway providing authentication, logging, and content filtering, profanity filtering, and prompt injection controls. The combined answer change adds a synthesis step downstream of the already grounded candidate answers and does not alter these controls. The model's grounding control is the verbal reinforcement step applied on the foundation model. [TBD: Confirm from the application code whether the verbal reinforcement step suppresses an answer or only annotates it.]

The following early engagement observations are provided for the model owner's consideration and are not formal validation conclusions. The combined answer was deployed before the required approval, which the business line has remediated by disabling the model pending this review. Some pilot knowledge base links return access errors or no longer exist, and the business line will communicate knowledge base article changes going forward. The labeling that marks a cached answer as reviewed by subject matter experts is applied automatically when a query is promoted to the cache rather than by an actual review. [TBD: Confirm the cached-label observation with the model owner before finalizing.]

