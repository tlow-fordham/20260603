# 10 Model Governance

## 10.1 Development Document Review and Model Change Management

Validation reviewed the Model Development Document received 06/12/2026. The document describes the architecture, data, construction, and guardrails at a level adequate to support the review, but Validation identified several points where it does not match the deployed system, and one area where the change-management definitions require revision.

The documentation observations below are based on the Model Development Document version received 06/12/2026. The model owner has since revised the document, including to characterize the model as static; the remaining observations are to be re-verified against the current version before each is treated as a Finding, and some, for example the model owner name, may already be corrected. [TBD - obtain the current MDD revision and re-baseline the remaining items.]

On documentation accuracy and completeness, Validation noted a recurring pattern of differences between the document and the implementation evidenced in the code and configuration:

- the maximum output tokens is stated as both 25,000 and 2,000, with the deployed configuration showing 25,000 (Section 7.2 of this validation report);
- the document states that company size and revenue are extracted from the product documents, which those documents are unlikely to contain (Section 7.3);
- the development-data inventory lists nine documents but does not document the Talech origin of those documents or the Talech-to-Elavon rebranding, which is applied at the code level rather than in the documents, nor the curated elavonSellingPoints.xlsx source, which is the most-favored retrieval input (Section 7.1);
- the 1-to-5 selling-point rating feedback committed at the Provisional Approval was not implemented, and the documentation does not record that it is not collected (Section 12);
- the development date is stated as August 2025 while the version-control entry is dated May 2026.

Individually these are correctable; collectively they indicate that the documentation does not yet reflect the model as built. Validation notes that the development-data inventory does not document the Talech origin and code-level Talech-to-Elavon rebranding of the product documents, omits the curated elavonSellingPoints.xlsx source that carries the largest retrieval boost, and does not record that the 1-to-5 selling-point rating feedback committed at the Provisional Approval was not implemented, and raises these as part of Validation's Low Priority Finding on Documentation Transparency (see Section 5.4). The model owner should update the documentation to record the source, origin, and processing of all knowledge base and curated inputs, and the feedback currently collected, so that the documentation reflects the model as built.

On model change management, Validation reviewed the material-versus-minor change definitions in the Model Development Document. The document appropriately treats a change in the foundation model, significant prompt or constraint changes, changes to retrieval methodology, and changes to guardrails as material, requiring prior Model Risk Governance review. Validation noted that the document classifies the addition of new product domains and large-scale knowledge base updates as minor or business-as-usual. For a retrieval-augmented model whose outputs are grounded in the knowledge base, and given that the curated elavonSellingPoints.xlsx source carries the largest retrieval boost, an update to that source or to the knowledge base can directly change outputs; classifying such updates as business-as-usual did not align with Governance change-management requirements. At the 06/30 kickoff the model owner confirmed that the latest Model Development Document moves the addition of new product domains from minor to material, which addresses this point; Validation will verify this against the revised document and does not raise it as a Finding.

## 10.2 Model Change Review

As an initial validation of a new model, a post-production model change review is not applicable, as there is no prior validation against which to assess changes. Changes made during development and the pilot, including the Talech-to-Elavon rebranding and cache regeneration, are assessed within this validation rather than as a post-production change review.

Validation noted several changes the model owner should expect to manage under the change-management process going forward. The production deployment uses a preview version of the provider's interface (Azure OpenAI API version 2024-08-01-preview); preview versions can change in behavior or be deprecated, so the management of the interface version should be addressed. A future change of the foundation model, which serves both metadata extraction and generation, would be material under the document's own definitions, and a notification and validation path for such a change should be documented. The model owner should confirm whether any changes are expected before the next validation activity.

## 10.3 Model Inventory and EMA Review

Validation reviewed the Archer record and Enterprise Model Assessment (EMA-00000312, risk rating Low). Completing the inventory review against the deployed system, the following fields should be confirmed or corrected: the static or dynamic field, now revised to reflect the static and cached production pathway consistent with Sections 4 and 10.1; the model owner field, which should reflect Bhavya Reddy rather than Carl Huang; the production status and actual production use date, documented as 04/15/2026; the AI/ML and methodology fields; the foundation-model and platform details, namely GPT-4o accessed through the enterprise gateway with PostgreSQL and the pgvector extension; the removal of the legacy Feature-Benefit-Need (FBN) mapping reference, which is not used in production, where feature-plan mapping is used; the correction of the "customer interaction data" description, as only customer attributes (industry, sub-industry, and revenue) are used as inputs; and confirmation that no upstream or downstream estimation method dependencies exist [TBD]. The 06/30 kickoff confirmed that the current Enterprise Model Assessment covers the pilot stage and that a new production Enterprise Model Assessment will be required before the model moves to production, targeted before August; Model Risk Governance has noted this on the current record. Validation further notes that the appropriateness of the Low risk rating should be revisited in light of the open items identified in this validation; that assessment is reserved for the overall conclusion in Section 5.3.

