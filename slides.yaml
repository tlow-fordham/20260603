The production pathway is static and cached. Product recommendations are fixed for each customer segment, and previously generated selling points are returned from a cache keyed by customer segment, with new generation occurring only when no cached output exists for a segment. The Model Development Document and the Archer record have been revised to characterize the model as static, consistent with the static and cached production pathway observed in the system demonstration; this is documented in Sections 10.1 and 10.3. The knowledge base is refreshed on demand, in an event-driven manner when documents are uploaded or removed, with no scheduled batch re-indexing; the cache is regenerated accordingly.

The model has no upstream or downstream models. Its inputs are data rather than model outputs: customer attributes are sourced from the enterprise ELZ data store, and the recommender mapping is a configured lookup. The downstream consumer is the Salesforce banker workflow, a user-facing system rather than a model, in which a banker reviews the selling point before use but cannot modify it, as the generated selling points are controlled upstream. The feedback collected consists of preset reject reasons for the product recommendation, not the generated selling point; the 1-to-5 selling-point ratings described in the Provisional Approval were not implemented (Section 12). The model owner has indicated that free-text feedback for the product recommendation will be collected in production [TBD: Validation to confirm in the demonstration or code review]. Because there are no interconnected models, no model system applies, as addressed in Section 9.

The principal assumptions and limitations are the dependence of output quality on knowledge base accuracy and currency, generative phrasing variability controlled through low temperature and caching, limited domain coverage beyond the documented products, the absence of provenance in the user interface, and the absence of a selling-point quality signal in the captured feedback. These are summarized in Section 3 and assessed in Sections 7.5, 8, and 12.

