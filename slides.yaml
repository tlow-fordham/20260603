
# 4 Modeling Framework and Business Uses

Model-7468 GenAI Selling Points is an internally developed new model consisting of a single estimation method under one Model ID, with no sub-models or segments. It generates personalized, product-specific selling points for Business Banking customers from customer attributes and underlying product documentation, supporting Sales and Business Banking teams, thus improving the relevance, consistency, and efficiency of product messaging. The model replaces a manual and template-based process for creating selling points; there is no incumbent automated system performing this function.

The business line's stated objective for the model is to improve on the manual, template-based process in four respects: personalizing messaging at scale across diverse customer profiles, grounding selling points in current product capabilities through retrieval-augmented generation, maintaining consistency with compliance and brand standards, and reducing the operational effort of manual selling-point creation. These are the business line's objectives; Validation assesses the model against its intended use in the sections that follow.

Outputs are internal-facing. They are surfaced to bankers within the Salesforce recommendation workflow through an application programming interface (API), and the model does not interact with customers. The scope covers Business Banking customers across the supported industries and revenue bands, mapped to the documented Elavon payment products, including Elavon Mobile, Elavon Terminal, and Elavon Register. The knowledge base is a small set of product documents (generic Talech documents rebranded to Elavon during processing) together with a curated selling-points source. The model is currently in pilot use from 04/15/2026 through 08/14/2026, restricted to approximately 15 percent of the bankers; at full launch it will be exposed to 527 bankers, nationwide within the United States. The model serves Business Banking customer segments defined by industry (NAICS), sub-industry, and revenue band, producing 172 model-generated selling points. The customer and segment counts, the data statistics, and the segment-to-product mapping are set out in Section 7.1 of this validation report.

The scope of this Initial Validation is the model's generation of selling points for the three Elavon products, namely Elavon Mobile, Elavon Terminal, and Elavon Register. Three additional selling points for money-movement products, namely Bill Pay, Payroll, and Enhanced Payments, were compiled by subject matter experts and are stored as static entries in the PostgreSQL database with their own product identifiers; they are presented directly in the Salesforce interface without passing through the model's generation process. These money-movement selling points are out of scope for this validation and are not assessed in the sections that follow.

The model uses a hybrid architecture that combines a deterministic product recommender, a retrieval-augmented generation (RAG) component, a foundation large language model (LLM) for generation, and a production cache (see Figure 4.1). The deterministic recommender maps customer industry (North American Industry Classification System, or NAICS), sub-industry, and revenue band to a recommended product, plan, and key features through a predefined mapping table, so that identical inputs produce identical product selections. Customer attributes and the recommended product details are then assembled by a fixed template into a standardized query. Retrieval embeds the query using the text-embedding-ada-002 model (1,536 dimensions, deployed through Azure OpenAI) and compares it against product-document chunks stored in a PostgreSQL database with the pgvector extension. Retrieval is hybrid: the primary method is dense vector search over an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index, returning the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships; the combined set is re-ranked by a multi-factor relevance score before a final subset is passed to generation. Generation uses GPT-4o, accessed through the enterprise generative AI gateway, with no fine-tuning. Each output is a structured selling point consisting of a headline, a subheader, a body, bullet points, an optional disclaimer, the identifiers of the source documents used, and an effectiveness score.

