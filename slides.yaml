"7.2 Guardrail Testing","If backtesting or pilot query testing was conducted on guardrails, report total legitimate queries/answers tested, number incorrectly blocked, and number of harmful/inappropriate/inaccurate outputs that bypassed guardrails.","medium","2","2","If guardrail backtesting/pilot conducted; false-positive and false-negative rates."
