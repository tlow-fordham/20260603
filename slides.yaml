"7.1 Outcome Analysis","For RAG, document testing methodology for retrieval metrics like precision@k, recall@k, MRR@k, query-document relevance score, and retrieval failure rate, if available.","low","3","3","RAG only; N/A if not RAG. Intermediate diagnostic, not required at low risk: a wrong retrieval already surfaces in end-to-end correctness grading. Only relevant separately if end-to-end correctness is not otherwise evaluated."
