"7.1 Outcome Analysis","For continuous target predictions, common metrics such as adjusted R-square, RMSE, MAE and MAPE should be computed and reported.","medium","2","2","Only if a continuous-target component exists; N/A otherwise."
"7.1 Outcome Analysis","For classification models, metrics for discrimination and rank-ordering (KS statistic, Gini coefficient, ROC/Precision-Recall AUC) should be computed and reported.","medium","2","2","Only if a classification component exists; N/A otherwise."
"7.1 Outcome Analysis","Document the results of each test from box 1 above and summarize with tables and charts when possible.","high","2","2","Results are the evidence; required."
"7.1 Outcome Analysis","Where automated testing was conducted on a larger dataset than SME review, provide an assessment of the level of alignment between automated testing and the SME evaluation.","medium","2","2","Only when automated ran on a larger sample than SME."
"7.1 Outcome Analysis","Include applicable business metrics and results from backtesting or pilot if applicable (average handling time, issue resolution rate, customer satisfaction rating, churn rate, etc.).","medium","2","2","If a pilot/backtest ran; more relevant for customer-facing models."
