# 4 Modeling Framework and Business Uses

This section summarizes the salient facts about the model, its components, its dependencies, and how it is used. Assessments are reserved for Part II.

Model-7468 GenAI Selling Points is a new, single-method model; it is not a model suite and contains no separately inventoried sub-models or segments. It generates personalized, product-specific selling points for Business Banking customers from customer attributes and underlying product documentation, supporting Sales and Business Banking teams by improving the relevance, consistency, and efficiency of product messaging. The model replaces a manual and template-based process for creating selling points; there is no incumbent automated system performing this function.

Outputs are internal-facing. They are surfaced to bankers within the Salesforce recommendation workflow through an application programming interface (API), and the model does not interact with customers. The scope covers Business Banking customers across the supported industries and revenue bands, mapped to the documented Elavon payment products, including Elavon Mobile, Elavon Terminal, and Elavon Register. The knowledge base comprises nine product documents segmented into 28 chunks as documented, and the evaluation dataset comprises 172 queries. The number of bankers in the production population and the count of supported industry and revenue segments are to be confirmed [TBD].

The model uses a hybrid architecture that combines a deterministic product recommender, a retrieval-augmented generation (RAG) component, a foundation large language model (LLM) for generation, and a production cache. The deterministic recommender maps customer industry (North American Industry Classification System, or NAICS), sub-industry, and revenue band to a recommended product, plan, and key features through a predefined mapping table, so that identical inputs produce identical product selections. Customer attributes and the recommended product details are then assembled by a fixed template into a standardized query. Retrieval embeds the query using the text-embedding-ada-002 model (1,536 dimensions, deployed through Azure OpenAI) and compares it against product-document chunks stored in a PostgreSQL database with the pgvector extension, using dense search over an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index; the top 20 chunks are retrieved and re-ranked by a multi-factor relevance score before a final subset is passed to generation. Generation uses GPT-4o, accessed through the enterprise generative AI gateway, with no fine-tuning. Each output is a structured selling point consisting of a headline, a subheader, a body, bullet points, an optional disclaimer, the identifiers of the source documents used, and an effectiveness score.

The production pathway is static and cached. Product recommendations are fixed for each customer segment, and previously generated selling points are returned from a cache keyed by customer segment, with new generation occurring only when no cached output exists for a segment. The Model Development Document characterizes the model as dynamic, owing to evolving knowledge base content and real-time generation, while also describing production behavior as partially deterministic with cached reuse; Validation's understanding from the materials and the system demonstration is that the current production pathway is static and cached. This characterization is reconciled in Sections 10.1 and 10.3. The cadence at which the knowledge base is refreshed and the cache is regenerated, which is the static-model equivalent of a manual recalibration schedule, is to be confirmed [TBD].

The model has no upstream or downstream models. Its inputs are data rather than model outputs: customer attributes are sourced from the enterprise ELZ data store, and the recommender mapping is a configured lookup. The downstream consumer is the Salesforce banker workflow, a user-facing system rather than a model, in which a banker reviews and may edit a selling point before use and may provide feedback through ratings and comments. Because there are no interconnected models, no model system applies, as addressed in Section 9.

The principal assumptions and limitations are the dependence of output quality on knowledge base accuracy and currency, generative phrasing variability controlled through low temperature and caching, limited domain coverage beyond the documented products, the absence of provenance in the user interface, and the absence of a selling-point quality signal in the captured feedback. These are summarized in Section 3 and assessed in Sections 7.5, 8, and 12.
