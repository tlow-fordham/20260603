### ISS10 (Monitoring Plan) — Discussion on approach

Jordan framed the monitoring question: since the selling points are cached and not changing, what does ongoing monitoring look like?

Carl suggested providing an annual sampling of 20 of the 172 selling points showing expected versus actual retrieval results to prove the cache is functioning correctly.

Jinjun clarified the two dimensions: if the cache is static with no changes, SME review of the existing selling points and proof of correct retrieval may be sufficient. If new selling points are generated or real-time generation is enabled, that would be a different scope requiring a Targeted Scope Validation.

Jordan raised the broader point that business or regulatory conditions may change over time, such as new restrictions on product features or pricing disclosures, and that because the model relies on pre-generated and cached selling points, those outputs could become outdated or misaligned with current business policies even if the cache itself has not changed. Carl and Bhavya agreed that annual SME review of the cached selling points could address this. Bhavya also confirmed that any future generation of new selling points (new products, new segments, knowledge base updates) will go through the change management process, which the group agreed would require a Targeted Scope Validation.

Bhavya committed that any updates to selling points or changes to the knowledge base materials will include SME review. Bhavya was uncertain about conducting end-user surveys of bankers and deferred that to Arunkumar.

Jinjun confirmed the group's understanding: if the cache changes, it triggers a change process; if there are no changes, the monitoring is lighter (annual SME review and proof of correct retrieval).

