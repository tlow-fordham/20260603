7.1 Outcome Analysis - Test Design and Methodology Review
---
Existing Validation Scope
(1) Review the overall array of tests performed by the model owner to evidence the model's efficacy for its intended use. Assess whether the test plan covers the necessary dimensions (accuracy, relevancy, faithfulness, retrieval quality where applicable).
(2) For each test, review the description of the test, the purpose of the test, and the testing procedures. Assess whether the methodology is sound and appropriate for the use case.
(3) If both automated and human testing were utilized, review the methods used to recalibrate the automatic evaluation to align with human reviews. Assess whether the recalibration approach is valid (e.g., whether the LLM-judge scoring scale maps coherently to SME rubrics, whether the overlap sample is sufficient).
(4) If the model has undergone a pilot, review pilot usage and scope documentation. Assess whether the pilot population, volume, and duration are sufficient to draw performance conclusions.

Streamlined Validation Scope
(1) Review the overall array of tests performed by the model owner to evidence the model's efficacy for its intended use. Assess whether the test plan covers the necessary dimensions.
(2) For each test, review the description of the test, the purpose of the test, and the testing procedures. Test descriptions and procedures may be obtained or inferred after kickoff if results are available.
(3) If both automated and human testing were utilized, review the methods used to recalibrate the automatic evaluation to align with human reviews. Assess whether the recalibration approach is valid.
(4) If the model has undergone a pilot, review pilot usage and scope documentation.

Reduced Work for Validation
- No reduction. These are review activities that frame the rest of the outcome analysis.


7.1 Outcome Analysis - Automated-vs-SME Alignment Assessment
---
Existing Validation Scope
(1) When automated testing was conducted on a larger dataset than SME review, assess the level of alignment between the automated testing results and the SME evaluation results on the overlapping sample.
(2) Evaluate whether discrepancies between automated scores and SME ratings indicate a systemic bias in the automated evaluation (e.g., LLM-as-a-judge inflating accuracy scores relative to SME ground truth).
(3) If alignment is poor, investigate root causes: flawed rubric definitions, different grading scales, evaluator LLM limitations, or insufficient overlap sample size.

Streamlined Validation Scope
(1) When automated testing was conducted on a larger dataset than SME review, assess the level of alignment between the automated testing results and the SME evaluation results on the overlapping sample.
(2) Evaluate whether discrepancies between automated scores and SME ratings indicate a systemic bias in the automated evaluation.
(3) If alignment is poor, investigate root causes: flawed rubric definitions, different grading scales, evaluator LLM limitations, or insufficient overlap sample size.

Reduced Work for Validation
- No reduction. This is a review and analytical activity, not independent testing.


7.1 Outcome Analysis - Segment and Cluster Performance
---
Existing Validation Scope
(1) If the model is developed by segments (based on customer profile, business domain, etc.) or if segment/cluster labels are available in the metadata, review performance testing results across different clusters or segments.
(2) Assess whether pooled aggregate metrics mask weak performance in specific sub-populations (e.g., specific query types, document categories, customer segments, geographies, languages).
(3) Flag any segments where performance degrades materially below the aggregate and assess the business impact of that degradation.

Streamlined Validation Scope
(1) If the model is developed by segments or if segment/cluster labels are available in the metadata, review performance testing results across different clusters or segments.
(2) Assess whether pooled aggregate metrics mask weak performance in specific sub-populations.
(3) Flag any segments where performance degrades materially below the aggregate and assess the business impact of that degradation.

Reduced Work for Validation
- No reduction. The model owner may provide segment results at a less granular level at low risk, but Validation's review of whatever is provided is unchanged.


7.1 Outcome Analysis - Business and Pilot Metrics
---
Existing Validation Scope
(1) Review applicable business metrics and results from backtesting or pilot if applicable (e.g., average handling time, issue resolution rate, customer satisfaction rating, churn rate).
(2) Assess whether the selection of business metrics is aligned with the model's stated business purpose.
(3) Review usage analysis: trends in weekly query volumes, median and peak values, distributions of in-scope and out-of-scope queries, and user feedback signals (e.g., thumb-up/thumb-down responses) if available.

Streamlined Validation Scope
(1) Review applicable business metrics and results from backtesting or pilot if applicable.
(2) Assess whether the selection of business metrics is aligned with the model's stated business purpose.
(3) Review usage analysis if available.

Reduced Work for Validation
- No reduction. These are review activities. The model owner may provide less at low risk, but Validation reviews what is provided.


7.1 Outcome Analysis - Overall Application-Level Performance
---
Existing Validation Scope
(1) Review the overall LLM application-level performance results on the corresponding use case, which reflects the combined performance of all components such as foundation LLM, RAG, and fine-tuning.
(2) Assess whether the headline metric represents end-to-end performance rather than component-level performance only.
(3) For proprietary vendor models, assess whether performance was tested on U.S. Bank data and whether results are representative of production conditions.

Streamlined Validation Scope
(1) Review the overall LLM application-level performance results on the corresponding use case.
(2) Assess whether the headline metric represents end-to-end performance rather than component-level performance only.
(3) For proprietary vendor models, assess whether performance was tested on U.S. Bank data and whether results are representative of production conditions.

Reduced Work for Validation
- No reduction. This is the headline performance assessment.


7.1 Outcome Analysis - Interpretation and Conclusion
---
Existing Validation Scope
(1) Review the model owner's interpretation and conclusion for each test, with proper explanation and justification of any anomalies or performance degradation observed.
(2) Independently interpret the results and assess whether the model owner's conclusions are supported by the evidence.
(3) Provide Validation's own commentary on performance implications, particularly where the model owner's interpretation is overly optimistic or does not address observed weaknesses.

Streamlined Validation Scope
(1) Review the model owner's interpretation and conclusion for each test, with proper explanation and justification of any anomalies or performance degradation observed.
(2) Independently interpret the results and assess whether the model owner's conclusions are supported by the evidence.
(3) Provide Validation's own commentary on performance implications where warranted.

Reduced Work for Validation
- No reduction. Validation's independent interpretation is a core review activity.


7.1 Outcome Analysis - Upstream Model Impact
---
Existing Validation Scope
(1) If the model includes upstream models as inputs, evaluate the impact of the upstream models on model performance.
(2) If no impact assessment was performed, review the model owner's justification for its exclusion.

Streamlined Validation Scope
(1) If the model includes upstream models as inputs, review the model owner's assessment of upstream model impact if provided.
(2) If no impact assessment was performed, confirm a justification for exclusion is documented.

Reduced Work for Validation
- Upstream model impact assessment is Low priority at low risk. Validation reviews if provided but does not require it. A justified exclusion is acceptable.


7.2 Guardrail Testing - Hallucination Detection
---
Existing Validation Scope
(1) Assess the model owner's hallucination testing methodology: whether suitable metrics are chosen to compare responses against retrieved articles or source content.
(2) Evaluate whether the criteria for blocking or flagging hallucinated answers are appropriate for the use case.
(3) Assess the model owner's handling of out-of-domain queries and edge cases where hallucination risk is elevated.
(4) If Validation performs independent hallucination testing, design test cases targeting known hallucination-prone scenarios (out-of-scope queries, ambiguous queries, queries where source content is thin).

Streamlined Validation Scope
(1) Hallucination detection remains in scope. Assess the model owner's hallucination testing methodology and whether suitable metrics are chosen.
(2) Evaluate whether the criteria for blocking or flagging hallucinated answers are appropriate for the use case.
(3) Assess handling of out-of-domain queries and edge cases where hallucination risk is elevated.

Reduced Work for Validation
- No need to design or run independent hallucination test cases. Validation reviews the model owner's hallucination testing results and assesses hallucination risk through the outcome analysis (7.1) performance results.


7.2 Guardrail Testing - Pilot/Backtesting Results
---
Existing Validation Scope
(1) If backtesting or pilot query testing was conducted on guardrails, review total number of legitimate business queries or answers tested.
(2) Review number of legitimate queries or answers incorrectly blocked (false positives).
(3) Review number of harmful, inappropriate, or inaccurate queries or outputs that bypassed guardrails (false negatives).
(4) Assess the balance between false-positive and false-negative rates and the impact on user experience and safety.

Streamlined Validation Scope
(1) If backtesting or pilot query testing was conducted on guardrails, review false-positive and false-negative rates reported by the model owner.
(2) Assess the balance between safety strictness and system utility based on the reported rates.

Reduced Work for Validation
- Validation reviews reported rates rather than conducting independent guardrail backtesting. Smaller sample sizes are acceptable at low risk.


7.2 Guardrail Testing - Vendor Safety Features
---
Existing Validation Scope
(1) For vendor models, review the performance documentation of vendor-provided safety features (such as AWS Bedrock Guardrails or Azure AI Content Safety).
(2) Assess whether the vendor's safety feature configuration (thresholds, categories, custom blocklists) is appropriate for the model's use case.
(3) Evaluate any gaps between the vendor's safety coverage and the model's specific risk profile.

Streamlined Validation Scope
(1) For vendor models, review the performance documentation of vendor-provided safety features.
(2) Assess whether the vendor's safety feature configuration is appropriate for the model's use case.
(3) Evaluate any gaps between the vendor's safety coverage and the model's specific risk profile.

Reduced Work for Validation
- No reduction. This is a review activity for vendor models where applicable.
