"Requirement","Priority","Complexity to implement (MD/MO)","Complexity to assess (Validation)","Notes"
"7.1 Tests for accuracy/efficacy (overall)","high","3","3","Always required. Owner picks the method."
"7.1 Human (SME) testing","medium","3","2","SME or automated required. Emphasize worst-performing samples with root cause analysis. SME alone insufficient when wrong outputs read as well-formed; for cached content, also check output vs source."
"7.1 Automated testing (statistical / LLM-as-judge)","medium","3","3","Alternative or complement to SME. Review the judge rubric/prompt; judge must use retrieved context."
"7.1 RAG retrieval metrics (precision/recall/MRR@k)","low","3","3","Optional if end-to-end accuracy is acceptable. Raise to Medium when wrong-document retrieval is a real failure mode."
"7.1 Agentic component testing","Low (agentic) / N/A (non-agentic)","5 (agentic)","4 (agentic)","Non-agentic (in scope): does not apply (N/A). The proposal classes agentic AI as high complexity on the full cycle, so N/A is the in-scope value; the Low branch is retained provisionally for a low-risk agentic model pending final approval. Covers planning success, tool selection, memory, multi-agent coordination."
"7.1 Classification/regression metrics","medium","2","2","Only if such a component exists; N/A otherwise."
"7.1 Document results and conclusions","high","2","2","Always required."
"7.1 Automated vs SME alignment","medium","2","2","Only when automated ran on a larger sample than SME."
"7.1 Business / pilot metrics","medium","2","2","Include if a pilot ran. More relevant for customer-facing models."
"7.1 Segment-level performance","medium","3","2","Raise to High where a pooled number hides a weak sub-population."
"7.1 Development-partition results","low","4","3","Only for custom-built or fine-tuned models. Uncommon at low risk."
"7.1 Overall application-level performance","high","3","2","Headline metric: combined end-to-end performance."
"7.1 Upstream model impact","low","2","2","Only if upstream models feed inputs; justified exclusion acceptable."
"7.1 Vendor performance testing (retro / live)","high","3","3","Evidence on U.S. Bank data and intended use, not vendor benchmarks."
"7.2 Hallucination detection","medium","3","3","Raise to High for customer-facing or generated-then-cached content. Lower when outputs are constrained/hard-coded."
"7.2 Toxicity testing","low","3","2","Not required at low risk. Customer-facing (esp. voice) tests regardless."
"7.2 Adversarial testing (injection / jailbreak / exfiltration)","low","4","4","Not required at low risk. Likelihood is driven by external/customer-facing exposure, which low-risk models typically lack (customer-facing use usually raises the risk rating). Agentic autonomy raises breach impact, not exposure, so it does not by itself elevate this. Elevate for customer-facing exposure (e.g., a customer-facing informational model rated low)."
"7.2 Guardrail metrics/results","medium","2","2","Report for tests performed. Focus on false-negative rate."
"7.3 Benchmark selection & methodology","low","4","3","Not required at low risk. Exception: replacement or upgrade models (including a foundation LLM major upgrade, which is a material change) must benchmark the incumbent and demonstrate equal or improved performance (then High)."
"7.3 Quantitative findings & trade-offs","low","3","2","Only if benchmarking was performed."
"7.4 Regulatory context summary (OCC 2011-12)","low","1","1","If sensitivity excluded, short methodology statement plus justification."
"7.4 Sensitivity frameworks","low","3","3","Not required at low risk."
"7.4 Execution & documentation (incl. robustness)","low","4","3","Not required. Raise to Medium for multi-turn models (coherence, topic-change handling)."
"7.4 Vendor sensitivity testing (black-box)","low","2","2","Not required. Good to have when white-box is blocked by vendor IP."
"7.5 Explainability: transparency & traceability","medium","2","2","Raise to High where outputs feed customer-facing statements and provenance is the only error catch. Document SME flag/escalation."
