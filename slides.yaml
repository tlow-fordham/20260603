Aditi asked about the Archer description referencing "Feature-Benefit-Need (FBN) mapping." Carl clarified that the current production system uses feature-plan mapping from the recommendation rule file, not FBN. FBN exists in the rag_plus_generator code, which is the legacy code path not currently in use. FBN could be implemented in the future but is not active now. The Archer description needs to be updated.

