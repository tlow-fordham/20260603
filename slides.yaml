## Datadog Log Export

Jordan asked whether Bhavya has access to Datadog. Bhavya indicated she already has Datadog access for other projects. Carl noted that Datadog logs are raw system logs and would not be analytically useful, but alerts trigger ServiceNow tickets visible to the broader team.

Jordan asked for a small production log export sample, not for real-time monitoring but to demonstrate audit readiness (ability to provide logs within 48 hours if requested by auditors). Carl exported a Datadog log file during the meeting and shared it in the chat (extract-2026-06-16T17_52_35.880Z.csv). Carl noted that Datadog limits exports to 50,000 entries; the past 15 days contain over 300,000 log entries, so the export is a partial sample.

Jordan asked about the Datadog retention policy. Carl responded in the chat that the retention policy is not set by the model team and he is unsure of the exact duration. However, Carl noted that the retention policy is not the binding constraint: the application is required to redeploy at least once every 90 days (and more frequently in practice due to security remediations), and old logs are purged from Datadog upon redeployment. This means effective log retention in Datadog is limited to the interval between deployments, not the enterprise retention policy.

