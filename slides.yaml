Arunkumar provided context on the banker experience: bankers have indicated through quarterly outreach sessions that they want minimal input requirements. The recommendation workflow is embedded in their regular BCRM workflow, and introducing additional feedback on selling points would add complexity the bankers have resisted. Arunkumar stated that adding selling point feedback to BCRM would require development cycles, banker training, and coordination with the BCRM team, and confirmed this is not in scope for the August full rollout.

Jordan asked whether there were 422 errors on the feedback endpoint that might indicate failed submissions. Carl stated that monitoring is in place via Datadog and ServiceNow, and no such errors have been observed.

Jordan pointed out the discrepancy between the OpenAPI specification (where feedback_text and feedback_target_id are listed as optional) and the Pydantic model (where both are required). Carl acknowledged the OpenAPI spec is not currently being maintained and that the teams use a Confluence page as the source of truth for the API contract. Carl committed to having an engineer update the OpenAPI spec.

