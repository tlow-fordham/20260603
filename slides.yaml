Segments are defined by three attributes: revenue band, industry, and sub-industry. Per the post-rebrand mapping document (Product Recommendation - After Rebrand.xlsx), the taxonomy comprises three revenue bands (under $50,000; $50,000 to $500,000; and $500,000 to $2.5 million), four industries (Other, Restaurants, Retail, and Services), and 67 sub-industries. The segment-to-product mapping maps each valid revenue-band, industry, and sub-industry combination to a product, plan, and five features. The mapping produced 186 segment rows at the Provisional Approval, of which 172 carry a NAICS code and generate a selling point and 14 do not; these counts should be confirmed against the post-rebrand file [TBD].

