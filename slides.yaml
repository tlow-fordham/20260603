Section 7 - Validation Scope for Low/Ultra-Low Risk GenAI Models


7.1 Outcome Analysis - SME Testing
---
Existing Validation Scope
(1) Assess SME selection criteria and required experience.
(2) Summarize and evaluate data description, period, sampling method, sample size, scope of selected queries, adequacy of samples, and any bias toward specific business lines or query types.
(3) Review metric definitions and rubrics (accuracy, relevancy) and flag ambiguities or undefined terms.
(4) Review distribution of SME rating values across the sample.
(5) Review the model owner's root cause analysis for samples with low SME ratings.

Streamlined Validation Scope
(1) Review model owner-provided SME results, evaluate sample composition and representativeness, review rubrics and metric definitions, review distribution of SME ratings, review root cause analysis for low-rated samples.
(2) SME evaluation requires fewer samples than higher-risk models.
(3) No reduction in review rigor.

Reduced Work for Validation
- No reduction.


7.1 Outcome Analysis - Automated Testing
---
Existing Validation Scope
(1) Summarize and evaluate data description, period, sampling method, sample size.
(2) Assess strengths and limits of statistical metrics (e.g., ROUGE/BLEU measure n-gram overlap but not semantic similarity; BERTScore provides a fuller picture).
(3) Evaluate LLM-as-a-judge setup: prompt definitions, rubrics, evaluator LLM selection (same LLM as generator may bias results), and metric values.
(4) For RAG, evaluate retrieval metrics (MRR@k, precision@k, recall@k).
(5) Review business metrics for alignment with business purpose.
(6) Review alignment between automated testing and SME evaluation results.
(7) Generate a synthetic dataset (topic modeling, question type distribution).
(8) Calculate statistical metrics missed or incorrectly computed by the model owner.
(9) Conduct independent LLM-as-a-judge analysis on areas overlooked or inadequately handled by the model owner, with commentary on accuracy/hallucination risk, retrieval quality, and alignment with user intent.

Streamlined Validation Scope
(1) Review model owner-provided automated test results, focusing on key metric scores rather than a full spectrum of metrics.
(2) Verify metric definitions and computation logic.
(3) Evaluate metric selection for the use case.
(4) Evaluate LLM-as-a-judge setup (prompt definitions, rubrics, evaluator LLM selection).
(5) Assess automated-vs-SME alignment on overlapping samples.
(6) For RAG, review model owner-provided retrieval metrics but do not independently compute them.
(7) Review business metrics for alignment with business purpose.
(8) Do not generate synthetic datasets, run additional model queries, or conduct independent LLM-as-a-judge analysis.

Reduced Work for Validation
- No need to generate synthetic test datasets, run additional model queries through the model, or conduct independent LLM-as-a-judge analysis.
- If the model owner's testing is insufficient, this supports an unfavorable outcome rather than supplemental independent testing by Validation.


7.1 Outcome Analysis - Classification/Regression
---
Existing Validation Scope
(1) If the framework includes classification or regression sub-models, review reported discrimination and stability metrics (KS, Gini, AUC, R-squared, RMSE, MAE).

Streamlined Validation Scope
(1) Unchanged. Review reported metrics if a classification or regression component exists.

Reduced Work for Validation
- No reduction.


7.1 Outcome Analysis - Results and Vendor
---
Existing Validation Scope
(1) Review and independently interpret all test results.
(2) Check for anomalies, weak sub-populations, and segment-level degradation.
(3) Evaluate overall application-level performance on U.S. Bank data.
(4) For vendor models, assess whether outcome analysis includes performance on U.S. Bank internal data.
(5) Evaluate data source, dependent variable definition, and sample construction for internal outcome analysis.
(6) If U.S. Bank data testing was not obtained, assess justification.
(7) If more than 15 months since development, include consortium monitoring results where possible.

Streamlined Validation Scope
(1) Review and independently interpret all model owner-provided test results.
(2) Check for anomalies, weak sub-populations, and segment-level degradation.
(3) Evaluate overall application-level performance on U.S. Bank data.
(4) For vendor models, review testing methodology and U.S. Bank data representativeness.
(5) Assess justification if U.S. Bank data testing was not obtained.

Reduced Work for Validation
- No reduction in review depth. The reduction is in independent test generation and execution, not in interpretation or analytical rigor.


7.2 Guardrail Testing
---
Existing Validation Scope
(1) Assess the model owner's hallucination testing (whether suitable metrics compare responses against retrieved content, whether blocking criteria are appropriate).
(2) Assess toxicity testing (method/language model used, threshold settings).
(3) Assess adversarial testing design (whether it covers varied attack styles, threshold settings, aggregation method across attack types).
(4) Evaluate outcomes: overall blocking rates, number of adversarial queries, most frequent successful attack types, false-positive rate (legitimate queries wrongly blocked).
(5) Review model owner examples of false positives or negatives and assess impact.
(6) Evaluate effectiveness of human-in-the-loop processes if relevant.
(7) Curate an independent guardrail/red-teaming dataset.
(8) Specify LLM name/version, dataset descriptions, and attack types.
(9) Calculate blocking rates by attack type and business segment.
(10) Review samples of adversarial queries that bypass guardrails and evaluate potential reputation, legal, and cybersecurity impact.
(11) Evaluate efficacy of preventing out-of-scope inquiries.

Streamlined Validation Scope
(1) Review model owner-provided guardrail testing results and documentation where submitted.
(2) Hallucination detection remains in scope and is assessed through outcome analysis (7.1), not as a separate guardrail exercise.
(3) Review false-positive and false-negative rates if reported by the model owner.
(4) Review vendor safety feature documentation (e.g., AWS Bedrock Guardrails, Azure AI Content Safety) if applicable.
(5) Smaller sample sizes are acceptable for non-customer-facing applications or where human review occurs.
(6) Elevate toxicity/adversarial testing for customer-facing exposure on a case-by-case basis.
(7) Do not curate an independent guardrail testing dataset or run independent red-teaming analysis.

Reduced Work for Validation
- No need to curate an independent guardrail or red-teaming dataset, run independent guardrail tests against the model, or calculate independent blocking metrics.
- Toxicity testing, adversarial/prompt injection testing, red-teaming procedures, and detailed failure pattern analysis are not required at low risk.


7.3 Benchmarking
---
Existing Validation Scope
(1) Recap the model owner's benchmarking methodology and results: cross-vendor/cross-version comparisons, cross-framework comparisons, human performance baselines, simplified-method baselines.
(2) Qualitatively assess methods and results.
(3) Research industry benchmarks and external data for comparable use cases.
(4) For replacement/upgrade models, assess whether performance meets or exceeds the incumbent on comparable test data.
(5) If benchmarking was excluded, review justification.
(6) Conduct validation-based benchmarking as needed.

Streamlined Validation Scope
(1) Confirm a justification for omission is documented if benchmarking was not performed.
(2) If the model owner provides benchmarking results voluntarily, accept as supplementary context.
(3) Exception: for replacement or upgrade models (including foundation LLM major upgrades), review incumbent-vs-new performance comparison (High priority regardless of risk tier).

Reduced Work for Validation
- No need to review model owner benchmarking results in detail, research industry benchmarks, or conduct validation-based benchmarking.
- At low risk, exclusion of benchmarking is acceptable when the model is not a replacement and no industry or internal benchmark exists.


7.4 Sensitivity and Robustness
---
Existing Validation Scope
(1) Review the model owner's sensitivity testing: assess how the model responds to identical or semantically similar queries (rephrasing, synonym substitutions, punctuation noise, typos, tone variations).
(2) For RAG, evaluate retrieval overlap metrics (e.g., Jaccard Score for overlap in retrieved articles for similar queries).
(3) Review robustness tests: response coherence across long contexts, topic-shift handling.
(4) Assess plausibility, stability, and conservation of how outputs respond to sensitivity experiments.
(5) Replicate the model owner's sensitivity results.
(6) Design and carry out validator-designed sensitivity tests (perturbed inputs, similarity scoring, LLM pairwise evaluation).
(7) For vendor models, check monotonicity of output relative to inputs or key risk drivers.
(8) If sensitivity testing is not possible, disclose the limitation.

Streamlined Validation Scope
(1) If the model owner provides sensitivity or robustness testing results, review the provided results for reasonableness.
(2) If sensitivity testing was not performed, confirm a justification for omission is documented.
(3) For multi-turn conversational models, robustness (coherence over extended conversations, topic-change handling) may be elevated as a Medium-priority model owner deliverable.
(4) Do not create perturbed inputs, replicate sensitivity results, or design validator-based sensitivity tests.

Reduced Work for Validation
- No need to create perturbed inputs, replicate the model owner's sensitivity results, generate outputs on perturbed queries, or compute similarity metrics.
- No need to design or carry out validator-based sensitivity tests.
- Independent testing is optional and may not be necessary if the developer's performance testing is sufficient.


7.5 Explainability
---
Existing Validation Scope
(1) Review data provenance and traceability mechanisms: evaluate how output elements are linked back to source documents and how provenance is presented to users in the interface.
(2) For RAG, review tracing of responses to originating context chunks.
(3) Document characteristics of the data sample used for explainability testing, including sample size and selection process.
(4) Review the SME process for identifying and flagging concerning patterns in explainability output.

Streamlined Validation Scope
(1) Unchanged. Review model owner-provided provenance documentation, traceability mechanisms, and SME escalation process.
(2) For RAG, review provenance analysis tracing outputs to context chunks.
(3) Document sample characteristics.
(4) No reduction in scope.

Reduced Work for Validation
- No reduction.
