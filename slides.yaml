# 8 Model Outcomes and Performance Review

## 8.1 Outcomes Analysis

Validation reviewed the performance evidence as documented. The developer reports subject matter expert validation across the evaluation dataset and an automated evaluation using an LLM-as-a-judge for faithfulness, answer relevance, and context relevance, supported by embedding similarity and standard retrieval metrics where ground truth is available.

Validation noted two matters bearing on the weight given to this evidence. First, the LLM-as-a-judge evaluation provides limited discriminating signal: in Validation's review the effectiveness score clustered near 0.92 with no meaningful correlation to the underlying critique, and the critique did not distinguish grounded from ungrounded outputs. Validation does not rely on the automated judge for the outcome and assesses faithfulness directly. Second, GPT-4o is used both to generate and to evaluate, which can bias automated scores; this reinforces reliance on subject matter expert review and Validation's independent check rather than the automated metric.

The subject matter expert row-level pass and fail results for all 172 selling points were delivered on 07/01/2026, and the model owner's initial results show a 100% pass rate; Validation's review of these results is in progress, and the denominator and per-segment breakdown should be stated explicitly [TBD]. A 100% aggregate pass rate warrants independent corroboration, which Validation provides through the faithfulness spot-check described next. Validation's independent faithfulness spot-check against the source documents is feasible with the materials in hand and is pending completion; because the curated selling-points spreadsheet (elavonSellingPoints.xlsx) receives the largest retrieval boost, the spot-check and the source set must include it, not only the nine documented files, and must account for the Talech-to-Elavon rebranding applied in processing, since rebranding errors would carry into the outputs (see Section 7.1) [TBD]. The business line confirmed on 06/18/2026 that the is_approved flag is not currently used and is not visible to users, so display is not gated on approval status, which explains the all-FALSE 06/02 export alongside the 06/15 demonstration; subject matter expert approval is therefore not enforced at the system level. The 06/30 kickoff confirmed that all outputs are served from the cache with no live generation and that the subject matter expert reviewed all 172 cached selling points individually, so the pilot does not add performance insight beyond the subject matter expert review; whether the served content is limited to subject matter expert-reviewed cache entries, and how any cache miss is handled, is carried into Section 11.2 [TBD].

## 8.2 Guardrail Analysis

Validation reviewed the documented guardrails. Input controls include PII detection using the Presidio framework, masking of sensitive content prior to processing, access control filtering, and the absence of free-text end-user input (the model is driven by structured customer attributes, not open user prompts). Output controls include compliance filtering, toxicity detection, and formatting validation. Bankers provide an additional review layer before any output is used.

In addition to the model's own guardrails, GPT-4o is reached only through U.S. Bank's gateway, which applies platform-level controls to all traffic. The gateway performs Personally Identifiable Information (PII) filtering on inputs and outputs, logs all interactions, and applies content filtering using neural multi-class classification that screens harmful content across four categories (hate, sexual, violence, and self-harm) at four severity levels, with content at medium or high severity filtered by default. These are enterprise-standard controls applied to all gateway traffic rather than controls tuned to this model, so they mitigate generic content and privacy risk but do not substitute for the model-specific faithfulness and grounding assessment in Section 8.1. Validation has no concerns with the gateway controls as a baseline guardrail for this internal-facing use.

For this internal-facing, low risk model whose inputs are structured rather than free-text, independent adversarial, toxicity, and red-team testing are not performed; the exposure that motivates that testing is limited here, and the human review control is the primary mitigant. Hallucination risk is assessed through the faithfulness review in Section 8.1 rather than a separate independent test. Because the is_approved flag is not currently enforced (Section 11.2), the operative human controls are the subject matter expert review of cache content and banker review before customer use; Validation's assessment of guardrail adequacy is contingent on confirming the coverage of that subject matter expert review and the handling of cache misses [TBD].

## 8.3 Benchmarking Analysis

Benchmarking is out of scope for this validation, as confirmed at the 06/30 kickoff. There is no incumbent automated system performing this function and no comparable internal or external benchmark for the generated content, and the documentation records this exclusion and its basis, which is acceptable for a non-replacement, low risk model.

## 8.4 Sensitivity and Robustness Analysis

Sensitivity and robustness analysis is out of scope for this validation, as confirmed at the 06/30 kickoff. The production pathway is deterministic and cached, so identical inputs return identical outputs, and there is no parameter training that would warrant input-perturbation sensitivity analysis of a fitted model; robustness in production derives from the deterministic recommender, retrieval grounding, cache-based consistency, and controlled input structure. The cache-retrieval behavior was evidenced by a 20-sample test reported in the documentation in which served responses matched the cached content character-for-character across a range of segments; a re-run against the current Elavon-branded cache is part of the Part 2 implementation verification (Section 11.3), which is out of scope for this validation.

## 8.5 Explainability Testing

Validation reviewed the explainability mechanisms. Outputs cite the source documents used and retain backend traceability to retrieved chunks, and retrieval ranking provides visibility into which content influenced an output. Validation noted that provenance is not exposed in the user interface; a banker reviewing an output cannot see the underlying source at the point of use. The documentation describes a planned future enhancement to expose traceability in the interface. For the current internal use with banker review, the available traceability is sufficient to support source verification during review, and the user-interface limitation is documented as a future enhancement.

## 8.6 Post-Development Production Adjustments

Post-development production adjustments are out of scope for this validation, as none are applied, confirmed at the 06/30 kickoff. The documentation states that output quality is controlled through design, guardrails, and human review rather than through post-development adjustments.
