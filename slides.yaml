# GenAI Streamline deck - proposed changes
# Base deck: 20260616_GenAI_Low_Risk_Validation_Timeline_Streamline_Slides.yaml
# Each block below is labeled NEW (insert) or MOD (drop-in replacement for the named existing slide).
# Percentages only; hours stay internal per Bob's direction.

slides:

  # ----- MOD: replaces existing Slide 2 "Executive Summary" (add one risk-based framing bullet) -----
  - layout: single
    title: "Executive Summary"
    sections:
      - bullets:
          - "Faster validation enables quicker deployment of GenAI solutions, allowing business lines to capture value through enhanced efficiency, scalability, and innovation."
          - "The MRM validation timeline for a subset of GenAI models may be reduced, supported by GenAI-specific development templates, insights from prior validation activities, and improved model development and documentation practices."
          - "Reductions are risk-based: they trim justification documentation and optional testing, while retaining core model documentation, data quality, and analysis relevant to higher inherent risk."
          - "Validation will remain risk-based, with heightened focus on areas of higher inherent model risk, including model performance, conceptual soundness, and monitoring processes. Non-agentic AI models in lower risk tiers may be subject to streamlined documentation and testing requirements."
          - "Continued MRM initiatives, including enhancements to the codebase and validation templates, are expected to further support a more efficient validation process."

  # ----- NEW: insert after Slide 4 "Expectations and Tradeoffs" (the quantified payoff) -----
  - layout: single
    title: "Estimated Reduction in Validation and Model Development Effort"
    sections:
      - bullets:
          - "The streamline reduces effort for both the Validation team and the Model Owner and Developer, with the largest savings concentrated in performance testing."
      - heading: "Estimated effort reduction by section"
        bullets:
          - "Development Data: Validation effort is reduced by approximately 36 percent and Model Developer effort by approximately 39 percent."
          - "Model Framework and Construction: Validation effort is reduced by approximately 50 percent and Model Developer effort by approximately 23 percent."
          - "Performance Testing: Validation effort is reduced by approximately 58 percent and Model Developer effort by approximately 52 percent."
          - "Across the development sections, Validation effort is reduced by approximately half and Model Developer effort by approximately 40 percent."
      - heading: "Where the savings come from"
        bullets:
          - "Validation savings come from removing independent testing where the developer's testing is sufficient, including benchmarking, sensitivity and robustness testing, most guardrail testing, and reducing code review to a spot-check."
          - "Model Developer savings come from reduced documentation of justification and rationale, fewer required test categories, and reduced synthetic data generation at low risk."
          - "Core review of model performance, conceptual soundness, data quality, and high-risk-relevant analysis is retained."

  # ----- NEW: insert after the effort slide (clarifies expanded scope per Jinjun) -----
  - layout: single
    title: "Scope: Full Validation, Not Only the Model Development Document"
    sections:
      - bullets:
          - "The streamline applies across the full validation, including the model development document, the monitoring plan, and the implementation framework."
          - "Reductions are concentrated in the development sections, namely data, construction, and performance testing."
          - "Governance, implementation, and ongoing monitoring reviews are largely retained, reflecting their role in managing post-deployment risk."

  # ----- MOD: replaces existing Slide 7 "Streamlined Requirements and Testing for MO/MD (Cont'd)" (performance testing) -----
  - layout: single
    title: "Streamlined Requirements and Testing for MO/MD (Cont'd)"
    sections:
      - bullets:
          - "Performance testing requirements can also be reduced."
      - heading: "Current requirements"
        bullets:
          - "Automated performance evaluation and SME performance evaluation on appropriate metrics such as accuracy, relevancy, and faithfulness."
          - "Guardrail testing such as hallucination detection, toxicity testing, and adversarial testing (prompt injection, jailbreaking, etc.)."
          - "Benchmarking GenAI models against other LLM vendors or versions, different model frameworks, human performance baselines, simplified methods, and traditional NLP models, if applicable."
          - "Sensitivity and robustness testing evaluating the relationship between model inputs and outputs."
      - heading: "Potential reduced requirements"
        bullets:
          - "Toxicity, adversarial, and red-teaming testing are not required at low risk; hallucination detection remains and is assessed through outcome analysis. Guardrail testing is elevated for customer-facing exposure."
          - "Benchmarking and sensitivity/robustness testing can be removed with a documented justification for omission. The incumbent comparison is retained for replacement or upgrade models."

  # ----- MOD: replaces existing Slide 8 "Reduced Independent Review and Testing by Validation" -----
  - layout: single
    title: "Reduced Independent Review and Testing by Validation"
    sections:
      - heading: "Reduced Independent Review"
        bullets:
          - "Reviewing of intermediate performance error analysis, if overall accuracy is acceptable and the business line has completed root cause analysis."
          - "Reviewing of hyperparameter tuning and the rationale of the model's final configurations."
          - "Reviewing of benchmarking and sensitivity/robustness, except the incumbent comparison for replacement or upgrade models, which is retained."
      - heading: "Reduced Independent Testing (if the provided testing is sufficient)"
        bullets:
          - "Independent synthetic dataset generation, LLM-as-a-judge analysis, and statistical metric computation."
          - "Independent guardrail testing, such as curating U.S. Bank-specific queries to test prompt injection and jailbreaking."
          - "Independent sensitivity and robustness testing, such as perturbing queries and evaluating the similarity of responses."
          - "Topic modeling to create synthetic testing data covering most knowledge base topics."
          - "Line-by-line code review is reduced to a spot-check of core modules."
      - heading: "Retained (risk-based focus)"
        bullets:
          - "Review of model performance and outcome analysis, conceptual soundness, data quality, and Validation's independent interpretation of results."
