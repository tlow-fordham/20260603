"7.2 Guardrail Testing","Hallucination Detection Testing: if applicable, document testing of guardrail effectiveness in detecting and blocking hallucinated responses, particularly for out-of-domain queries and edge cases.","medium","3","3","Not in the streamline waiver; relevant wherever the model generates user-visible content."
