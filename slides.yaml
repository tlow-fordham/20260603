### ISS5 and ISS8 (Production Logs and Data Retention) — Extended discussion

This was the most extensively discussed topic. Three categories of data access were clarified:

Easily accessible: The api_transactions table and feedback table are available via the Azure Data Warehouse / Data Lake. Arunkumar confirmed he can provide access and will send entitlements. Carl confirmed that api_transactions logs every external API interaction, including request payload, response payload, and timestamp for both the recommend and feedback endpoints.

Requires elevated access: Individual production database tables (selling_points, selling_point_components, etc.) can be accessed individually but require elevated access via DBA ticket. Tables cannot be joined on production. Carl reiterated that the data exists but cannot be assembled into a formatted file or downloaded via the UI for security and DLP reasons.

Not available: Server-level logs (full LLM prompts as formatted files) cannot be downloaded from production. Carl stated this is a security restriction determined at the enterprise level, not a team decision.

Sylvia proposed and the group agreed to the following: read-only UAT database access will be provisioned for the Validation team today, and Data Lake access for api_transactions and feedback will be provisioned by Arunkumar. Any additional production data will go through the standard DBA request process.

Jinjun emphasized that production interaction data logging is required under the MRM implementation framework and monitoring plan requirements, and that model owners are expected to have this data prepared for regulatory audit (OCC, FRB, internal audit) with a 24-hour response expectation. Jinjun stated that this is a first-line obligation, not something Validation should need to extract independently.

Carl responded that the API transactions table already captures the interaction data and that the information exists in the database tables, just not in a pre-assembled format. Sylvia proposed moving on and logging an additional tracker item for ongoing monitoring logging needs.

### ISS7 (Feedback) — Major clarification received

Bhavya acknowledged that the PA1 description of feedback (rating between 1 and 5 with text feedback) needs to be updated. The current implementation collects recommendation feedback only via a dropdown with approximately 6 pre-defined options. There is no rating scale and no selling point feedback mechanism in BCRM.

Carl shared his screen and ran the query Validation requested (SELECT DISTINCT feedback_type FROM feedback). Carl confirmed the feedback type filter on the admin UI is a feature that has not been maintained since initial development, similar to the is_approved field.

Arunkumar provided context on the banker experience: bankers have indicated through quarterly outreach sessions that they want minimal input requirements. The recommendation workflow is embedded in their regular BCRM workflow, and introducing additional feedback on selling points would add complexity the bankers have resisted. Arunkumar stated that adding selling point feedback to BCRM would require development cycles, banker training, and coordination with the BCRM team, and confirmed this is not in scope for the August full rollout.

Jordan asked whether there were 422 errors on the feedback endpoint that might indicate failed submissions. Carl stated that monitoring is in place via Datadog and ServiceNow, and no such errors have been observed.

Jordan pointed out the discrepancy between the OpenAPI specification (where feedback_text and feedback_target_id are listed as optional) and the Pydantic model (where both are required). Carl acknowledged the OpenAPI spec is not currently being maintained and that the teams use a Confluence page as the source of truth for the API contract. Carl committed to having an engineer update the OpenAPI spec.

