## Identify Development Priorities

**Given your career interests, where would you like to focus your development? Use the U.S. Bank Leadership Profile to help you identify where to prioritize your efforts.**

I want to focus on two areas:

**Digital and innovation first.** My technical depth is the foundation of my contributions, and I want to keep pushing it toward broader organizational impact. In H1 2026, I led three concurrent platform evaluations (Lumenova, Nimbus Uno, TrustWise), built the team's GenAI automation codebase through Phase 1, developed the DeepEval-backed evaluation and adversarial guardrail harness now used across multiple models, and authored the SR 2026-13a impact analysis that informed MRM's proportionality posture. In H2, I want to deepen my expertise in agentic AI evaluation frameworks and move the codebase into Phase 2, while continuing to translate technical depth into reusable tools and methodologies that scale beyond my individual work.

**Collaboration and engagement.** This half pushed me significantly in both people leadership and cross-functional collaboration. I onboarded and now manage two offshore team members (Aditi, Tessa), coached a team member through a performance improvement plan, covered for a peer during extended leave, and served as the team escalation path during my manager's absence. On the cross-functional side, I co-led the first-line GenAI presentation series on streamlining and change management, represented Validation at the MRM Monitoring Steering Committee, and contributed to the MRG quarterly stakeholder meeting, all of which required building partnerships across AI CoE, Technology Oversight, MRG, and the business lines. In H2, I want to build on this by strengthening my cross-functional partnerships with first-line AI enablement and platform teams, becoming more deliberate about delegation, and developing my team members' ability to operate independently.

