## Introduction and Transition

Jordan opened the meeting by noting that Mehdi Mafi has left the firm. Jordan is now the Primary Validator and Aditi remains the Secondary Validator. Jordan acknowledged the extensive Early Engagement period (five meetings from May through June, plus a system demo on 06/15) and framed this meeting as the formal transition from Early Engagement into the Initial Validation under the streamlined low-risk timeline of 6 to 8 weeks.

---

## Validation Scope and Possible Outcomes

Aditi presented the validation scope. The following sections are in scope: model data and conceptual soundness (development data, framework and theory, assumptions and limitations), outcome analysis, explainability, model governance (change management review, development document, model inventory and EMA), implementation framework and production controls (Part 1 of the implementation document), and monitoring plan review.

The following are out of scope: post-development adjustments (none exist), benchmarking, sensitivity and robustness analysis, model system review (the model is not part of a model system), model change review (post-production), implementation Part 2 (due 90 days after model implementation), and the monitoring report.

Three possible outcomes were presented: Approved (with or without findings), Approved with Restrictions (time-bound or compensating controls), and Not Approved. For time-bound restrictions, the restriction effective date is the date of last approved use, not the sign-off date.

---

## SME Review

Aditi noted that Validation requires a row-level pass/fail spreadsheet from the SME, not just an email confirmation. Bhavya explained that the SME (the Talech/Elavon product lead) reviewed each of the 172 selling points individually, which took approximately two weeks. She asked whether the confirmation email from the SME could serve as the source of truth.

Jordan clarified that Validation needs the spreadsheet to demonstrate row-level review and to provide a cross-reference for future changes to the cache. Bhavya agreed to create the spreadsheet, add the pass/fail column on the SME's behalf, and copy the SME on the email so he is on the thread.

