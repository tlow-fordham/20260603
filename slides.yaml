The small size of the knowledge base is favorable for source-grounded review, because Validation can compare generated claims against the full set of source documents at the document level without depending on chunk-level granularity. Validation noted that the documentation states all product types and all segment combinations are represented and that no token truncation was observed. The representativeness of the 172-query evaluation set across all intended industry and revenue segments has not been fully demonstrated in the materials reviewed; the sample size of 172 is informative, but its per-segment breakdown should be confirmed [TBD]. Validation also noted that the knowledge base has shifted to the current Elavon-branded product set, so the data statistics should be confirmed against the current content if it differs from the 32 chunks documented [TBD].

On data quality and governance, the documentation describes subject matter expert content validation prior to ingestion, handling of null and invalid content, deduplication of overlapping table and text content, and retrieval-coverage checks. Validation has no concerns with the described data quality controls for a knowledge base of this size, subject to confirming the current-cache statistics noted above.

Validation noted that the current development-data inventory understates the sources and processing. The nine documented files are generic Talech product documents, and a code-level search-and-replace during processing rebrands the Talech terminology to Elavon, which accounts for the Elavon products in the outputs. Two further sources feed the model: the product-recommendation mapping document (186 segment rows) and the curated selling-point examples, elavonSellingPoints.xlsx (six examples), which receive the model's largest retrieval boost (Section 7.3) and are therefore the most-favored retrieval input. Both were reviewed at the Provisional Approval, the curated examples then as talechSellingPoints.xlsx, and should be documented in the current Model Development Document's data inventory in their Elavon form. Because the outputs depend on rebranded content, Validation should confirm that the Talech-to-Elavon search-and-replace is accurate and complete, since differences between Elavon and Talech product names, features, or plans could carry into the outputs; this is assessed with the faithfulness review in Section 8.1 [TBD].

## 7.2 Model Framework and Theory

Validation reviewed the model's design as documented and summarized in Figure 4.1. The hybrid approach, a deterministic recommender for product selection combined with retrieval-augmented generation (RAG) for content and a production cache for stability, is consistent with the intended use of producing grounded, consistent product messaging for internal banker review. Restricting generation to retrieved product content and fixing product selection through deterministic logic are appropriate choices for limiting hallucination and output variability in this use case. Validation has no concerns with the overall framework and theory as presented for this internal-facing, low risk use.

The model uses two externally developed foundation models from the same provider, accessed through Azure OpenAI by way of the enterprise generative AI gateway, with no fine-tuning. GPT-4o is the large language model (LLM) used for both document metadata extraction during pre-processing and selling-point generation. The text-embedding-ada-002 model is the embedding model used to represent both the product-document chunks and the query for retrieval, producing 1,536-dimension vectors. The same two models therefore serve multiple steps of the pipeline shown in Figure 4.1. Because both models come from a single external provider and serve more than one stage, a change to either model would affect multiple pipeline stages; the change-management treatment of such a change is addressed in Section 10.1.

GPT-4o, developed by OpenAI, is accessed through U.S. Bank's Azure OpenAI gateway, which is maintained by Information Systems Security and is the bank's sanctioned path for foundation-model access. The platform-level controls the gateway applies (authentication and authorization, logging, Personally Identifiable Information (PII) filtering, and content filtering) are described as constructed in Section 7.3 and assessed as a guardrail in Section 8.2.

On capabilities and context limits, GPT-4o is a general-purpose, instruction-following generative model that supports structured output (the application is configured to return JavaScript Object Notation, or JSON), multilingual text, and summarization and synthesis, which align with the requirement to generate concise, grounded selling points. Its published input context window is approximately 128,000 tokens, and its training knowledge has a fixed cutoff date; reliance on retrieval grounding mitigates the knowledge-cutoff limitation for product-specific content. The text-embedding-ada-002 model is a general-purpose retrieval embedding model with a published maximum input of approximately 8,191 tokens, comfortably above the configured 4,000-character chunk size. The exact context window, maximum output tokens, knowledge cutoff, and model size for the deployed versions should be confirmed against current vendor documentation, noting that OpenAI does not publicly disclose GPT-4o's parameter count [TBD verify]. Validation noted that the maximum output tokens setting, which caps the length of the generated response rather than the input, is set to 25,000 in the reviewed development configuration. At the 06/30 kickoff the model owner confirmed the intended limits are 128,000 input tokens and 25,000 output tokens, and that the 2,000 figure elsewhere in the document is an error to be corrected. Validation notes that a 25,000-token output nonetheless exceeds GPT-4o's published maximum output [TBD verify], so the production value and its effect should be confirmed.

On support for the model selection, GPT-4o and text-embedding-ada-002 are widely adopted, industry-standard models, and GPT-4o is reported to perform competitively on public instruction-following and generation benchmarks. This published standing, together with the use-case fit described above, supports the appropriateness of the selection for a low risk, internal-facing application. Validation reviewed this as support for the design choice; it is distinct from the outcome benchmarking addressed in Section 8.3, which is not applicable for this model. Any specific benchmark or leaderboard figures relied on to support the selection should be referenced to their published source [TBD]. Validation further noted that text-embedding-ada-002 is a prior-generation embedding model and that newer embedding models are available; whether to adopt a newer model is a matter for the model owner to consider and does not raise a concern for the current use.

## 7.3 Model Construction and Selection

Validation reviewed the construction details. Documents are chunked using a two-tier approach, page-level segmentation followed by recursive character splitting, at 4,000 characters with 200-character overlap, and chunks are canonicalized to normalize brand and product terminology, which includes a search-and-replace that rebrands the generic Talech source content to Elavon. Retrieval is hybrid: a primary dense vector search with L2 (Euclidean) distance over an Inverted File with Flat compression (IVFFlat) index of 100 partitions, returning the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships, followed by a multi-factor relevance score with documented boosts (curated selling-point documents, product-type match, business-size match, content-category match, and recency), penalties (product-type mismatch and near-duplicate content), a minimum relevance threshold of 0.2, and per-document and total chunk limits for diversity. The 06/30 kickoff clarified that the production code path is rag_feature_generator.py; the rag_plus_generator.py path is legacy and not in production, and Validation's assessment addresses the production path. GPT-4o is used at a low-creativity setting for metadata extraction (temperature 0.1) and at a low temperature for generation (temperature 0.2 in the documented configuration), with a structured JSON response format and a custom, dynamically assembled prompt that places retrieved chunks behind a clear boundary to limit prompt injection and includes explicit negative constraints, for example not fabricating features and avoiding specific revenue figures. Validation has no concerns with the construction approach as documented.

The input and output guardrails are constructed around the gateway through which GPT-4o is accessed. The gateway applies authentication and authorization, comprehensive logging of interactions, Personally Identifiable Information (PII) detection and filtering, and content filtering, and contractual and technical controls provide that U.S. Bank data is not used by the provider to train its foundation models. The model also applies its own input handling, including PII handling, and output post-processing. Validation has no concerns with the construction of these controls as documented; the content and PII filtering are detailed and assessed as guardrails in Section 8.2.

Validation noted that the configuration block in the documentation shows a development environment setting (ENV_CAT=dev) and a default temperature of 0.2, while the narrative refers to a low temperature for consistency. The configuration values that apply in production, including the temperature, the token limits noted in Section 7.2, and the environment, should be confirmed against the production deployment; this confirmation is part of the Part 2 implementation verification (Section 11.3), which is deferred and out of scope for this validation.

Validation noted several construction points to confirm with the model owner. The retrieval index is an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index configured with 100 partitions, which is unusual for a corpus of 32 chunks, where partitioning provides little benefit and an exact search would be both trivial and fully deterministic; the rationale and any effect on recall or determinism should be confirmed [TBD]. Because the corpus is small and the retrieval caps return up to ten chunks, a large fraction of the knowledge base may be supplied to generation for each query, so the degree to which the ranking discriminates should be confirmed [TBD]. The re-ranking also applies a business-size match boost that depends on a company_size value, and an annual_revenue field, that the documentation states are extracted from the documents by GPT-4o; product documents are unlikely to state customer company size or revenue, so the coverage of these fields across the chunks and how often the size and revenue boosts engage should be confirmed [TBD].

## 7.4 Development Adjustments

Validation reviewed the adjustments applied to the model during development, before final performance evaluation. The development-time adjustments are the retrieval re-ranking tunings, the minimum relevance threshold, and the per-document and total chunk caps described in Section 7.3; their final configured values are disclosed. Consistent with the streamlined scope, the final configurations are disclosed even though a full tuning-justification record is not required at low risk. No score calibrations, overlays, or overrides are applied to the generated output during development. Validation has no concerns with this position. Adjustments applied after development, during or prior to use, are addressed in Section 8.6.

## 7.5 Assumptions and Limitations

Validation reviewed the assumptions and limitations identified by the developer and assessed their treatment. The developer identifies dependence on knowledge base quality (high materiality, mitigated by subject matter expert validation and version-controlled updates), generative output variability (medium, mitigated by low temperature and caching), limited domain coverage (low, mitigated by retrieval filtering and fallback responses), and token or context limits (low, mitigated by prompt standardization and grounding). Validation has no concerns with the developer's characterization for the documented products.

Validation additionally noted three limitations not fully developed in the documentation. Provenance is not exposed in the user interface and is available only in backend logs, which constrains a banker's ability to verify the source of a claim at the point of use. The captured feedback signal tracks the product recommendation rather than the quality of the generated selling point, which limits the ability to monitor generation quality after deployment. The LLM-as-a-judge evaluation was found to provide limited discriminating signal and is not relied upon by Validation. These are developed in Sections 8.5, 12.1, and 8.1 respectively.

