# 5 Validation Summary

## 5.1 Prior Validation Outcomes

This is the initial validation of a new model; there are no prior full-validation outcomes. The model has operated in a limited pilot under a Provisional Approval, granted an Approved with Restriction outcome on 12/11/2025 for pilot use from 12/15/2025 through 04/15/2026, and a subsequent Special Purpose Validation that extended the pilot to 08/14/2026 (approved 04/09/2026). Both were time-bound provisional outcomes restricting the pilot to a subset of Small Business Specialist bankers and to three products, and neither raised any actionable or non-actionable issues or findings. This Initial Validation is the full validation that supersedes the provisional approval; its outcome will replace the current time-bound restriction.

## 5.2 Summary of Recent Changes to Model

Measured against the last validation activity, the Provisional Approval and its Special Purpose Validation extension, two changes are relevant. First, the product branding changed from Talech to Elavon, implemented as a code-level search-and-replace during document processing, with the source documents unchanged and the production cache regenerated against the Elavon-branded content; this is assessed in Sections 7.1 and 8.1 of this validation report. Second, the banker feedback committed at the Provisional Approval, a 1-to-5 selling-point rating with free text, was not implemented: the 1-to-5 rating is not collected, addressed under the Low Priority Finding on Documentation Transparency, and the committed free-text feedback was not captured, addressed under the Moderate Priority, open-and-close Finding on Coding Errors resolved during the review; the feedback currently collected consists of preset reject reasons on the product recommendation rather than on the generated selling point (Sections 10.1, 12, and 5.4). The model framework is otherwise unchanged from the provisionally approved version. No model changes were made during the course of this Initial Validation, as the model was under a code freeze.

